Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ROCKETMQ::Instance
  To: alicloud_ons_instance
Properties:
  DeletionForce:
    Ignore: true
  InstanceName:
    To: instance_name
  Remark:
    To: remark
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  Arn:
    Ignore: true
  HttpInternalEndpoint:
    Ignore: true
  HttpInternetEndpoint:
    Ignore: true
  HttpInternetSecureEndpoint:
    Ignore: true
  InstanceId:
    To: id
  InstanceName:
    To: instance_name
  InstanceName$$0:
    To: name
  InstanceType:
    To: instance_type
  TcpEndpoint:
    Ignore: true
