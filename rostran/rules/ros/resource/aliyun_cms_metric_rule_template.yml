Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CMS::MetricRuleTemplate
  To: alicloud_cms_metric_rule_template
Properties:
  AlertTemplates:
    To: alert_templates
    Type: List
    Schema:
      Category:
        To: category
      Escalations:
        Ignore: true
      MetricName:
        To: metric_name
      Namespace:
        To: namespace
      Period:
        Ignore: true
      RuleName:
        To: rule_name
      Selector:
        Ignore: true
      Webhook:
        To: webhook
  Description:
    To: description
  Name:
    To: metric_rule_template_name
  RestVersion:
    To: rest_version
  TemplateId:
    Ignore: true
Attributes:
  Id:
    To: id
