Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::RDS::ReadOnlyDBInstance
  To: alicloud_db_readonly_instance
Properties:
  AutoRenew:
    To: auto_renew
  Category:
    Ignore: true
  DBInstanceClass:
    To: instance_type
  DBInstanceDescription:
    To: instance_name
  DBInstanceId:
    To: master_db_instance_id
  DBInstanceStorage:
    To: instance_storage
  DBInstanceStorageType:
    To: db_instance_storage_type
  DedicatedHostGroupId:
    Ignore: true
  DeletionProtection:
    To: deletion_protection
  EngineVersion:
    To: engine_version
  PayType:
    To: instance_charge_type
  Period:
    To: period
  PeriodType:
    Ignore: true
  PrivateIpAddress:
    Ignore: true
  ResourceGroupId:
    To: resource_group_id
  Tags:
    To: tags
    Handler: handle_tags
  TargetDedicatedHostIdForMaster:
    Ignore: true
  VPCId:
    Ignore: true
  VSwitchId:
    To: vswitch_id
  ZoneId:
    To: zone_id
Attributes:
  ConnectionString:
    To: connection_string
  DBInstanceId:
    To: id
  Port:
    To: port
