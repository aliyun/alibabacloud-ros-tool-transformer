Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::DNS::AddressPool
  To: alicloud_alidns_address_pool
Properties:
  Addr:
    To: address
    Type: List
    Schema:
      Addr:
        Ignore: true
      AttributeInfo:
        To: attribute_info
      LbaWeight:
        To: lba_weight
      Mode:
        To: mode
      Remark:
        To: remark
  EvaluationCount:
    Ignore: true
  InstanceId:
    To: instance_id
  Interval:
    Ignore: true
  IspCityNode:
    Ignore: true
  LbaStrategy:
    To: lba_strategy
  MonitorExtendInfo:
    Ignore: true
  MonitorStatus:
    Ignore: true
  Name:
    To: address_pool_name
  ProtocolType:
    Ignore: true
  Timeout:
    Ignore: true
  Type:
    To: type
Attributes:
  AddrPoolId:
    To: id
