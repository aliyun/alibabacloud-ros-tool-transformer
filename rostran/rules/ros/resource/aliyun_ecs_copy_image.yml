Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ECS::CopyImage
  To: alicloud_image_copy
Properties:
  AllowCopyInSameRegion:
    Ignore: true
  DestinationDescription:
    To: description
  DestinationImageName:
    To: image_name
  DestinationRegionId:
    Ignore: true
  Encrypted:
    To: encrypted
  ImageId:
    To: source_image_id
  KMSKeyId:
    To: kms_key_id
  ResourceGroupId:
    Ignore: true
  SourceRegionId:
    To: source_region_id
  Tag:
    To: tags
    Handler: handle_tags
Attributes:
  DestinationRegionId:
    Ignore: true
  ImageId:
    To: id
  SourceRegionId:
    Ignore: true
