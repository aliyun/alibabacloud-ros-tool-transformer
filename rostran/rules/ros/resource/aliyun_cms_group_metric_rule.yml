Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CMS::GroupMetricRule
  To: alicloud_cms_group_metric_rule
Properties:
  Category:
    To: category
  ContactGroups:
    To: contact_groups
  Dimensions:
    To: dimensions
  EffectiveInterval:
    To: effective_interval
  EmailSubject:
    To: email_subject
  Escalations:
    To: escalations
    Type: Map
    Schema:
      Critical:
        To: critical
      Info:
        To: info
      Warn:
        To: warn
  ExtraDimensionJson:
    Ignore: true
  GroupId:
    To: group_id
  Interval:
    To: interval
  MetricName:
    To: metric_name
  Namespace:
    To: namespace
  NoDataPolicy:
    Ignore: true
  NoEffectiveInterval:
    To: no_effective_interval
  Options:
    Ignore: true
  Period:
    To: period
  RuleId:
    To: rule_id
  RuleName:
    To: group_metric_rule_name
  SilenceTime:
    To: silence_time
  Webhook:
    To: webhook
Attributes:
  RuleId:
    To: id
  RuleId$$0:
    To: rule_id
