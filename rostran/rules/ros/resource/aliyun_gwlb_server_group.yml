Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::GWLB::ServerGroup
  To: alicloud_gwlb_server_group
Properties:
  ConnectionDrainConfig:
    To: connection_drain_config
    Type: Map
    Schema:
      ConnectionDrainEnabled:
        To: connection_drain_enabled
      ConnectionDrainTimeout:
        To: connection_drain_timeout
  HealthCheckConfig:
    To: health_check_config
    Type: Map
    Schema:
      HealthCheckConnectPort:
        To: health_check_connect_port
      HealthCheckConnectTimeout:
        To: health_check_connect_timeout
      HealthCheckDomain:
        To: health_check_domain
      HealthCheckEnabled:
        To: health_check_enabled
      HealthCheckHttpCode:
        To: health_check_http_code
      HealthCheckInterval:
        To: health_check_interval
      HealthCheckPath:
        To: health_check_path
      HealthCheckProtocol:
        To: health_check_protocol
      HealthyThreshold:
        To: healthy_threshold
      UnhealthyThreshold:
        To: unhealthy_threshold
  Protocol:
    To: protocol
  ResourceGroupId:
    To: resource_group_id
  Scheduler:
    To: scheduler
  ServerGroupName:
    To: server_group_name
  ServerGroupType:
    To: server_group_type
  Servers:
    To: servers
    Type: List
    Schema:
      Port:
        Ignore: true
      ServerId:
        To: server_id
      ServerIp:
        To: server_ip
      ServerType:
        To: server_type
  Tags:
    To: tags
    Handler: handle_tags
  VpcId:
    To: vpc_id
Attributes:
  ConnectionDrainConfig:
    Ignore: true
  CreateTime:
    To: create_time
  HealthCheckConfig:
    Ignore: true
  Protocol:
    Ignore: true
  ResourceGroupId:
    Ignore: true
  Scheduler:
    Ignore: true
  ServerGroupId:
    To: id
  ServerGroupName:
    Ignore: true
  ServerGroupType:
    Ignore: true
  Servers:
    To: servers
  Tags:
    Ignore: true
  VpcId:
    Ignore: true
