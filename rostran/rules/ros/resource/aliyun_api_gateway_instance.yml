Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ApiGateway::Instance
  To: alicloud_api_gateway_instance
Properties:
  AutoPay:
    Ignore: true
  ChargeType:
    To: payment_type
  DeletionForce:
    Ignore: true
  Duration:
    To: duration
  HttpsPolicy:
    To: https_policy
  InstanceName:
    To: instance_name
  InstanceSpec:
    To: instance_spec
  PricingCycle:
    To: pricing_cycle
  Tags:
    Ignore: true
  ZoneId:
    To: zone_id
Attributes:
  Arn:
    Ignore: true
  EgressIpv6Enable:
    To: egress_ipv6_enable
  InstanceId:
    To: id
  InstanceType:
    To: instance_type
  InternetEgressAddress:
    Ignore: true
  SupportIpv6:
    To: support_ipv6
  VpcEgressAddress:
    Ignore: true
  VpcIntranetEnable:
    Ignore: true
  VpcSlbIntranetEnable:
    To: vpc_slb_intranet_enable
