      Alias:
        To: alias
      CaseSensitive:
        To: case_sensitive
      Delimiter:
        Ignore: true
      EnableAnalytics:
        To: enable_analytics
      IncludeChinese:
        To: include_chinese
      JsonKeyIndices:
