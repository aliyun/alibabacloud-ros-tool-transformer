        Schema:
          Alias:
            To: alias
          EnableAnalytics:
            To: doc_value
          Name:
            To: name
          Type:
            To: type
      Name:
        To: name
      Type:
        To: type
  LogReduce:
    To: log_reduce
  LogstoreName:
    To: logstore
  ProjectName:
    To: project
