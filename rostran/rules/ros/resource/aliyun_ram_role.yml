Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::RAM::Role
  To: alicloud_ram_role
Properties:
  AssumeRolePolicyDocument:
    To: document
  AssumeRolePolicyDocument$$0:
    To: document
  DeletionForce:
    To: force
  Description:
    To: description
  IgnoreExisting:
    Ignore: true
  MaxSessionDuration:
    To: max_session_duration
  Policies:
    Ignore: true
  PolicyAttachments:
    Ignore: true
  RoleName:
    To: name
  RoleName$$0:
    To: role_name
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  Arn:
    To: arn
  RoleId:
    To: role_id
  RoleName:
    To: id
