Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ECS::ElasticityAssurance
  To: alicloud_ecs_elasticity_assurance
Properties:
  Description:
    To: description
  InstanceAmount:
    To: instance_amount
  Period:
    To: period
  PeriodUnit:
    To: period_unit
  ResourceGroupId:
    To: resource_group_id
  StartTime:
    To: start_time
  Tags:
    To: tags
    Handler: handle_tags
  PrivatePoolOptions:
    To: private_pool_options_match_criteria
  ZoneId:
    To: zone_ids
  InstanceTypes:
    To: instance_type
  AutoRenew:
    To: auto_renew
  AutoRenewPeriod:
    To: auto_renew_period
  PrivatePoolOptions$$0:
    To: private_pool_options_name
  RecurrenceRules:
    Ignore: true
  InstanceCpuCoreCount:
    Ignore: true
Attributes:
  PrivatePoolOptionsId:
    To: id
  PrivatePoolOptionsId$$0:
    To: elasticity_assurance_id
