Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::MNS::Subscription
  To: alicloud_message_service_subscription
Properties:
  DlqPolicy:
    To: dlq_policy
    Type: Map
    Schema:
      DeadLetterTargetQueue:
        To: dead_letter_target_queue
      Enabled:
        To: enabled
  Endpoint:
    To: endpoint
  FilterTag:
    To: filter_tag
  NotifyContentFormat:
    To: notify_content_format
  NotifyStrategy:
    To: notify_strategy
  PushType:
    To: push_type
  SubscriptionName:
    To: subscription_name
  TopicName:
    To: topic_name
Attributes:
  SubscriptionName:
    To: id
  SubscriptionName$$0:
    To: subscription_name
  SubscriptionUrl:
    Ignore: true
  TopicName:
    To: topic_name
