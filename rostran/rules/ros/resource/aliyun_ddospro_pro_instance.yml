Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::DDoSPro::ProInstance
  To: alicloud_ddoscoo_instance
Properties:
  AddressType:
    To: address_type
  Bandwidth:
    To: bandwidth
    Handler: to_int
  BaseBandwidth:
    To: base_bandwidth
    Handler: to_int
  BurstBandwidthMode:
    To: bandwidth_mode
  DomainCount:
    To: domain_count
    Handler: to_int
  Edition:
    To: edition_sale
  FunctionVersion:
    To: function_version
  NormalQps:
    To: normal_qps
    Handler: to_int
  Period:
    To: period
    Handler: to_int
  PeriodUnit:
    Ignore: true
  PortCount:
    To: port_count
    Handler: to_int
  ServiceBandwidth:
    To: service_bandwidth
    Handler: to_int
  ServicePartner:
    To: product_type
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  Arn:
    Ignore: true
  InstanceId:
    To: id
