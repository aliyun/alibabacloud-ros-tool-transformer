Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SLB::AccessControl
  To: alicloud_slb_acl
Properties:
  AclEntries:
    To: entry_list
    Type: List
    Schema:
      Comment:
        To: comment
      Entry:
        To: entry
  AclEntries$$0:
    To: entry_list
    Type: List
    Schema:
      Comment:
        To: comment
      Entry:
        To: entry
  AclName:
    To: name
  AddressIPVersion:
    To: ip_version
  ResourceGroupId:
    To: resource_group_id
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  AclId:
    To: id
  Arn:
    Ignore: true
