Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CS::ManagedEdgeKubernetesCluster
  To: alicloud_cs_edge_kubernetes
Properties:
  Addons:
    To: addons
    Type: List
    Schema:
      Config:
        To: config
      Disabled:
        To: disabled
      Name:
        To: name
  CloudMonitorFlags:
    To: install_cloud_monitor
  ClusterSpec:
    To: cluster_spec
  ContainerCidr:
    To: pod_cidr
  DeletionProtection:
    To: deletion_protection
  EncryptionProviderKey:
    Ignore: true
  EndpointPublicAccess:
    To: slb_internet_enabled
  IpStack:
    Ignore: true
  IsEnterpriseSecurityGroup:
    To: is_enterprise_security_group
  KeyPair:
    To: key_name
  KubernetesVersion:
    To: version
  LoginPassword:
    To: password
  MaintenanceWindow:
    Ignore: true
  Name:
    To: name
  NodeCidrMask:
    To: node_cidr_mask
  NodePools:
    Ignore: true
  Profile:
    Ignore: true
  ProxyMode:
    To: proxy_mode
  ResourceGroupId:
    To: resource_group_id
  RrsaConfig:
    Ignore: true
  ServiceCidr:
    To: service_cidr
  SnatEntry:
    To: new_nat_gateway
  Tags:
    To: tags
    Handler: handle_tags
  TimeoutMins:
    Ignore: true
  VSwitchIds:
    To: worker_vswitch_ids
  VpcId:
    To: vpc_id
  ZoneIds:
    To: availability_zone
Attributes:
  APIServerSLBId:
    To: slb_internet
  APIServerSLBId$$0:
    To: slb_intranet
  ClusterId:
    To: id
  DefaultUserKubeConfig:
    Ignore: true
  IngressSLBId:
    Ignore: true
  Nodes:
    To: worker_nodes
  PrivateUserKubConfig:
    Ignore: true
  ScalingConfigurationId:
    Ignore: true
  ScalingGroupId:
    Ignore: true
  ScalingRuleId:
    Ignore: true
  TaskId:
    Ignore: true
  WorkerRamRoleName:
    To: worker_ram_role_name
