Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CS::ManagedEdgeKubernetesCluster
  To: alicloud_cs_edge_kubernetes
Properties:
  Addons:
    To: addons
    Type: List
    Schema:
      Config:
        To: config
      Disabled:
        To: disabled
      Name:
        To: name
  ClusterSpec:
    To: cluster_spec
  DeletionProtection:
    To: deletion_protection
  IsEnterpriseSecurityGroup:
    To: is_enterprise_security_group
  Name:
    To: name
  NodeCidrMask:
    To: node_cidr_mask
  ProxyMode:
    To: proxy_mode
  ResourceGroupId:
    To: resource_group_id
  ServiceCidr:
    To: service_cidr
  VpcId:
    To: vpc_id
  Tags:
    To: tags
  LoginPassword:
    To: password
  EndpointPublicAccess:
    To: slb_internet_enabled
  Profile:
    Ignore: true
  ContainerCidr:
    To: pod_cidr
  CloudMonitorFlags:
    To: install_cloud_monitor
  SnatEntry:
    Ignore: true
  TimeoutMins:
    Ignore: true
  MaintenanceWindow:
    Ignore: true
  KeyPair:
    To: key_name
  ZoneIds:
    To: availability_zone
  KubernetesVersion:
    To: version
  NodePools:
    Ignore: true
  VSwitchIds:
    Ignore: true
  IpStack:
    Ignore: true
  RrsaConfig:
    Ignore: true
  EncryptionProviderKey:
    Ignore: true
Attributes:
  ClusterId:
    To: id
  Nodes:
    To: worker_nodes
  IngressSLBId:
    Ignore: true
  ScalingConfigurationId:
    Ignore: true
  ScalingGroupId:
    Ignore: true
  PrivateUserKubConfig:
    Ignore: true
  TaskId:
    Ignore: true
  APIServerSLBId:
    To: slb_internet
  DefaultUserKubeConfig:
    Ignore: true
  WorkerRamRoleName:
    To: worker_ram_role_name
  ScalingRuleId:
    Ignore: true
  APIServerSLBId$$0:
    To: slb_intranet
