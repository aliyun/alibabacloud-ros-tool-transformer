Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CMS::ResourceMetricRule
  To: alicloud_cms_alarm
Properties:
  CompositeExpression:
    To: composite_expression
    Type: Map
    Schema:
      ExpressionList:
        To: expression_list
      ExpressionListJoin:
        To: expression_list_join
      ExpressionRaw:
        To: expression_raw
      Level:
        To: level
      Times:
        To: times
  ContactGroups:
    To: contact_groups
  DeletionForce:
    Ignore: true
  EffectiveInterval:
    To: effective_interval
  EmailSubject:
    Ignore: true
  Escalations:
    To: comparison_operator
  Escalations$$0:
    To: threshold
  Interval:
    Ignore: true
  Labels:
    Ignore: true
  MetricName:
    To: metric_name
  Namespace:
    To: project
  NoDataPolicy:
    Ignore: true
  NoEffectiveInterval:
    Ignore: true
  Period:
    To: period
  Prometheus:
    To: prometheus
    Type: Map
    Schema:
      Annotations:
        To: annotations
      Level:
        To: level
      PromQL:
        To: prom_ql
      Times:
        To: times
  Resources:
    To: dimensions
  Resources$$0:
    To: metric_dimensions
  RuleId:
    Ignore: true
  RuleName:
    To: name
  SilenceTime:
    To: silence_time
  Webhook:
    To: targets
Attributes:
  RuleId:
    To: id
  RuleName:
    Ignore: true
