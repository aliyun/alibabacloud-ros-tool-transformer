Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::FC::Function
  To: alicloud_fcv2_function
Properties:
  AsyncConfiguration:
    Ignore: true
  CAPort:
    To: ca_port
  Code:
    To: filename
  Code$$0:
    To: oss_key
  Cpu:
    To: cpu
  CustomContainerConfig:
    To: custom_container_config
    Type: Map
    Schema:
      AccelerationType:
        Ignore: true
      Args:
        To: args
      Command:
        To: command
      Image:
        To: image
      InstanceId:
        Ignore: true
      WebServerMode:
        Ignore: true
  CustomDNS:
    To: custom_dns
    Type: Map
    Schema:
      DnsOptions:
        To: dns_options
      NameServers:
        To: name_servers
      Searches:
        To: searches
  CustomHealthCheckConfig:
    To: custom_health_check_config
    Type: Map
    Schema:
      FailureThreshold:
        To: failure_threshold
      HttpGetUrl:
        To: http_get_url
      InitialDelaySeconds:
        To: initial_delay_seconds
      PeriodSeconds:
        To: period_seconds
      SuccessThreshold:
        To: success_threshold
      TimeoutSeconds:
        To: timeout_seconds
  CustomRuntimeConfig:
    To: custom_runtime_config
    Type: Map
    Schema:
      Args:
        To: args
      Command:
        To: command
  Description:
    To: description
  DiskSize:
    To: disk_size
  EnvironmentVariables:
    To: environment_variables
  FunctionName:
    To: name
  FunctionName$$0:
    To: name_prefix
  GpuMemorySize:
    To: gpu_memory_size
  Handler:
    To: handler
  InitializationTimeout:
    To: initialization_timeout
  Initializer:
    To: initializer
  InstanceConcurrency:
    To: instance_concurrency
  InstanceLifecycleConfig:
    To: instance_lifecycle_config
    Type: Map
    Schema:
      PreFreeze:
        To: pre_freeze
      PreStop:
        To: pre_stop
  InstanceSoftConcurrency:
    Ignore: true
  InstanceType:
    To: instance_type
  MemorySize:
    To: memory_size
  Runtime:
    To: runtime
  ServiceName:
    To: service
  Timeout:
    To: timeout
Attributes:
  ARN:
    To: function_arn
  FunctionId:
    To: function_id
  FunctionName:
    To: function_name
  ServiceId:
    Ignore: true
  ServiceName:
    To: service_name
