Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::GPDB::ElasticDBInstance
  To: alicloud_gpdb_elastic_instance
Properties:
  BackupId:
    Ignore: true
  DBInstanceCategory:
    To: db_instance_category
  DBInstanceDescription:
    To: db_instance_description
  DBInstanceMode:
    Ignore: true
  EncryptionKey:
    To: encryption_key
  EncryptionType:
    To: encryption_type
  EngineVersion:
    To: engine_version
  InstanceSpec:
    To: instance_spec
  MasterNodeNum:
    Ignore: true
  PayType:
    To: payment_type
  Period:
    To: payment_duration
  PeriodUnit:
    To: payment_duration_unit
  PrivateIpAddress:
    Ignore: true
  SecurityIPList:
    To: security_ip_list
  SegNodeNum:
    To: seg_node_num
  SegStorageType:
    To: seg_storage_type
  SrcDbInstanceName:
    Ignore: true
  StorageSize:
    To: storage_size
  Tags:
    To: tags
    Handler: handle_tags
  VPCId:
    Ignore: true
  VSwitchId:
    To: vswitch_id
  ZoneId:
    To: zone_id
Attributes:
  Arn:
    Ignore: true
  ConnectionString:
    To: connection_string
  DBInstanceId:
    To: id
  OrderId:
    Ignore: true
  Port:
    To: port
