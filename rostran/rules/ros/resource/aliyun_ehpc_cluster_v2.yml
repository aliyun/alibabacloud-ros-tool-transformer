Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::EHPC::ClusterV2
  To: alicloud_ehpc_cluster_v2
Properties:
  AdditionalPackages:
    Ignore: true
  Addons:
    To: addons
    Type: List
    Schema:
      Name:
        To: name
      ResourcesSpec:
        To: resources_spec
      ServicesSpec:
        To: services_spec
      Version:
        To: version
  ClientVersion:
    To: client_version
  ClusterCategory:
    To: cluster_category
  ClusterCredentials:
    To: cluster_credentials
    Type: Map
    Schema:
      KeyPairName:
        To: key_pair_name
      Password:
        To: password
  ClusterCustomConfiguration:
    Ignore: true
  ClusterDescription:
    Ignore: true
  ClusterMode:
    To: cluster_mode
  ClusterName:
    To: cluster_name
  DeletionProtection:
    To: deletion_protection
  IsEnterpriseSecurityGroup:
    Ignore: true
  Manager:
    To: manager
    Type: Map
    Schema:
      DNS:
        To: dns
      DirectoryService:
        To: directory_service
      ManagerNode:
        To: manager_node
      Scheduler:
        To: scheduler
  MaxCoreCount:
    Ignore: true
  MaxCount:
    Ignore: true
  Queues:
    Ignore: true
  ResourceGroupId:
    To: resource_group_id
  SecurityGroupId:
    To: security_group_id
  SharedStorages:
    To: shared_storages
    Type: List
    Schema:
      FileSystemId:
        To: file_system_id
      MountDirectory:
        To: mount_directory
      MountOptions:
        To: mount_options
      MountTargetDomain:
        To: mount_target_domain
      NASDirectory:
        To: nas_directory
      ProtocolType:
        To: protocol_type
  Tags:
    Ignore: true
  VSwitchId:
    To: cluster_vswitch_id
  VpcId:
    To: cluster_vpc_id
Attributes:
  ClusterId:
    To: id
