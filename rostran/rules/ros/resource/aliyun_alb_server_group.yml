Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ALB::ServerGroup
  To: alicloud_alb_server_group
Properties:
  ConnectionDrainConfig:
    To: connection_drain_config
    Type: Map
    Schema:
      ConnectionDrainEnabled:
        To: connection_drain_enabled
      ConnectionDrainTimeout:
        To: connection_drain_timeout
  CrossZoneEnabled:
    To: cross_zone_enabled
  HealthCheckConfig:
    To: health_check_config
    Type: Map
    Schema:
      HealthCheckCodes:
        To: health_check_codes
      HealthCheckConnectPort:
        To: health_check_connect_port
      HealthCheckEnabled:
        To: health_check_enabled
      HealthCheckHost:
        To: health_check_host
      HealthCheckHttpVersion:
        To: health_check_http_version
      HealthCheckMethod:
        To: health_check_method
      HealthCheckPath:
        To: health_check_path
      HealthCheckProtocol:
        To: health_check_protocol
      HealthCheckTimeout:
        To: health_check_timeout
      HealthyThreshold:
        To: healthy_threshold
      UnhealthyThreshold:
        To: unhealthy_threshold
  Ipv6Enabled:
    To: ipv6_enabled
  Protocol:
    To: protocol
  ResourceGroupId:
    To: resource_group_id
  Scheduler:
    To: scheduler
  ServerGroupName:
    To: server_group_name
  ServerGroupType:
    To: server_group_type
  ServiceName:
    To: service_name
  SlowStartConfig:
    To: slow_start_config
    Type: Map
    Schema:
      SlowStartDuration:
        To: slow_start_duration
      SlowStartEnabled:
        To: slow_start_enabled
  StickySessionConfig:
    To: sticky_session_config
    Type: Map
    Schema:
      Cookie:
        To: cookie
      CookieTimeout:
        To: cookie_timeout
      StickySessionEnabled:
        To: sticky_session_enabled
      StickySessionType:
        To: sticky_session_type
  Tags:
    To: tags
    Handler: handle_tags
  UchConfig:
    To: uch_config
    Type: Map
    Schema:
      Type:
        To: type
      Value:
        To: value
  UpstreamKeepaliveEnabled:
    To: upstream_keepalive_enabled
  VpcId:
    To: vpc_id
Attributes:
  Arn:
    Ignore: true
  ServerGroupId:
    To: id
