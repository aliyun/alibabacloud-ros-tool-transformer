Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ESS::ScalingGroup
  To: alicloud_ess_scaling_group
Properties:
  AllocationStrategy:
    To: allocation_strategy
  AzBalance:
    To: az_balance
  CompensateWithOnDemand:
    To: capacity_options_compensate_with_on_demand
  CompensateWithOnDemand$$0:
    To: compensate_with_on_demand
  ContainerGroupId:
    To: container_group_id
  CustomPolicyARN:
    Ignore: true
  DBInstanceIds:
    To: db_instance_ids
  DefaultCooldown:
    To: default_cooldown
  DesiredCapacity:
    To: desired_capacity
  GroupDeletionProtection:
    To: group_deletion_protection
  GroupType:
    To: group_type
  HealthCheckType:
    To: health_check_type
  HealthCheckTypes:
    To: health_check_types
  InstanceId:
    To: instance_id
  LaunchTemplateId:
    To: launch_template_id
  LaunchTemplateOverrides:
    To: launch_template_override
    Type: List
    Schema:
      InstanceType:
        To: instance_type
      SpotPriceLimit:
        To: spot_price_limit
      WeightedCapacity:
        To: weighted_capacity
  LaunchTemplateVersion:
    To: launch_template_version
  LoadBalancerIds:
    To: loadbalancer_ids
  MaxInstanceLifetime:
    To: max_instance_lifetime
  MaxSize:
    To: max_size
  MinSize:
    To: min_size
  MultiAZPolicy:
    To: multi_az_policy
  NotificationConfigurations:
    Ignore: true
  OnDemandBaseCapacity:
    To: on_demand_base_capacity
  OnDemandBaseCapacity$$0:
    To: on_demand_base_capacity
  OnDemandPercentageAboveBaseCapacity:
    To: on_demand_percentage_above_base_capacity
  OnDemandPercentageAboveBaseCapacity$$0:
    To: on_demand_percentage_above_base_capacity
  ProtectedInstances:
    To: protected_instances
  RemovalPolicys:
    To: removal_policies
  ResourceGroupId:
    To: resource_group_id
  ScalingGroupName:
    To: scaling_group_name
  ScalingPolicy:
    To: scaling_policy
  ServerGroups:
    To: alb_server_group
    Type: List
    Schema:
      Port:
        To: port
      ServerGroupId:
        Ignore: true
      Type:
        Ignore: true
      Weight:
        To: weight
  SpotAllocationStrategy:
    To: spot_allocation_strategy
  SpotInstancePools:
    To: spot_instance_pools
  SpotInstanceRemedy:
    To: spot_instance_remedy
  StandbyInstances:
    Ignore: true
  Tags:
    To: tags
    Handler: handle_tags
  VSwitchId:
    To: vswitch_id
  VSwitchIds:
    To: vswitch_ids
Attributes:
  Arn:
    Ignore: true
  ScalingGroupId:
    To: id
  ScalingGroupName:
    To: scaling_group_name
