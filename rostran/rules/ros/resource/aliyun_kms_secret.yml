Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::KMS::Secret
  To: alicloud_kms_secret
Properties:
  DKMSInstanceId:
    To: dkms_instance_id
  Description:
    To: description
  EnableAutomaticRotation:
    To: enable_automatic_rotation
  EncryptionKeyId:
    To: encryption_key_id
  ExtendedConfig:
    To: extended_config
  ForceDeleteWithoutRecovery:
    To: force_delete_without_recovery
  Policy:
    To: policy
  RecoveryWindowInDays:
    To: recovery_window_in_days
  RotationInterval:
    To: rotation_interval
  SecretData:
    To: secret_data
  SecretDataType:
    To: secret_data_type
  SecretName:
    To: secret_name
  SecretType:
    To: secret_type
  Tags:
    To: tags
    Handler: handle_tags
  VersionId:
    To: version_id
  VersionStages:
    To: version_stages
Attributes:
  Arn:
    To: arn
  SecretName:
    To: id
  SecretName$$0:
    To: secret_name
