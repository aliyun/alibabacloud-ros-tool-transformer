Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::HBR::Policy
  To: alicloud_hbr_policy
Properties:
  PolicyDescription:
    To: policy_description
  PolicyName:
    To: policy_name
  PolicyType:
    To: policy_type
  Rules:
    To: rules
    Type: List
    Schema:
      ArchiveDays:
        To: archive_days
      ArchiveVaultId:
        Ignore: true
      BackupType:
        To: backup_type
      ColdArchiveDays:
        Ignore: true
      Continuous:
        Ignore: true
      DataSourceFilters:
        To: data_source_filters
      DoDetect:
        Ignore: true
      Immutable:
        Ignore: true
      KeepLatestSnapshots:
        To: keep_latest_snapshots
      ReplicationRegionId:
        To: replication_region_id
      ReplicationVaultId:
        Ignore: true
      Retention:
        To: retention
      RetentionRules:
        To: retention_rules
      RuleType:
        To: rule_type
      Schedule:
        To: schedule
      Selector:
        Ignore: true
      TagFilters:
        To: tag_filters
      VaultId:
        To: vault_id
Attributes:
  PolicyId:
    To: id
