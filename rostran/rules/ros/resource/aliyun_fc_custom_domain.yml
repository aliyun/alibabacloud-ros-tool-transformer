Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::FC::CustomDomain
  To: alicloud_fc_custom_domain
Properties:
  ApiVersion:
    To: api_version
  DomainName:
    To: domain_name
  Protocol:
    To: protocol
  RouteConfig:
    To: route_config
    Type: Map
    Schema:
      Routes:
        Ignore: true
  CertConfig:
    To: cert_config
    Type: Map
    Schema:
      CertName:
        To: cert_name
      Certificate:
        To: certificate
      PrivateKey:
        To: private_key
Attributes:
  DomainName:
    To: id
  DomainName$$0:
    To: domain_name
  Domain:
    Ignore: true
