Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SLB::MasterSlaveServerGroup
  To: alicloud_slb_master_slave_server_group
Properties:
  LoadBalancerId:
    To: load_balancer_id
  MasterSlaveBackendServers:
    To: servers
    Type: List
    Schema:
      Port:
        To: port
      ServerId:
        To: server_ids
        Handler: select_first
      ServerIp:
        Ignore: true
      ServerType:
        To: server_type
      Type:
        Ignore: true
      Weight:
        To: weight
  MasterSlaveServerGroupName:
    To: name
Attributes:
  MasterSlaveServerGroupId:
    To: id
