Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SLS::LogtailConfig
  To: alicloud_sls_logtail_config
Properties:
  CloneFrom:
    Ignore: true
  LogstoreName:
    To: logstore
  LogtailConfigName:
    To: name
  ProjectName:
    To: project
  RawConfigData:
    To: input_detail
  RawConfigData$$0:
    To: output_type
Attributes:
  AppliedMachineGroups:
    Ignore: true
  Endpoint:
    Ignore: true
  LogtailConfigName:
    Ignore: true
