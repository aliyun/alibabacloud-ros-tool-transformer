Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SLB::Listener
  To: alicloud_slb_listener
Properties:
  AclId:
    To: acl_id
  AclIds:
    To: acl_ids
  AclStatus:
    To: acl_status
  AclType:
    To: acl_type
  BackendServerPort:
    To: backend_port
  Bandwidth:
    To: bandwidth
  CACertificateId:
    To: ca_certificate_id
  ConnectionDrain:
    Ignore: true
  ConnectionDrainTimeout:
    To: established_timeout
  Description:
    To: description
  EnableHttp2:
    To: enable_http2
  FullNatEnabled:
    Ignore: true
  Gzip:
    To: gzip
  HealthCheck:
    Ignore: true
  HttpConfig:
    Ignore: true
  IdleTimeout:
    To: idle_timeout
  ListenerPort:
    To: frontend_port
  LoadBalancerId:
    To: load_balancer_id
  MasterSlaveServerGroupId:
    To: master_slave_server_group_id
  Persistence:
    Ignore: true
  PortRange:
    Ignore: true
  Protocol:
    To: protocol
  ProxyProtocolV2Enabled:
    To: proxy_protocol_v2_enabled
  RequestTimeout:
    To: request_timeout
  Scheduler:
    To: scheduler
  ServerCertificateId:
    To: server_certificate_id
  ServerCertificateId$$0:
    To: ssl_certificate_id
  StartListener:
    Ignore: true
  TLSCipherPolicy:
    To: tls_cipher_policy
  Tags:
    Ignore: true
  VServerGroupId:
    To: server_group_id
Attributes:
  Arn:
    Ignore: true
  ListenerPortsAndProtocol:
    Ignore: true
  LoadBalancerId:
    To: load_balancer_id
