Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::NLB::Listener
  To: alicloud_nlb_listener
Properties:
  AlpnEnabled:
    To: alpn_enabled
  AlpnPolicy:
    To: alpn_policy
  CaCertificateIds:
    To: ca_certificate_ids
  CaEnabled:
    To: ca_enabled
  CertificateIds:
    To: certificate_ids
  Cps:
    To: cps
  Enable:
    To: status
  EndPort:
    To: end_port
  IdleTimeout:
    To: idle_timeout
  ListenerDescription:
    To: listener_description
  ListenerPort:
    To: listener_port
  ListenerProtocol:
    To: listener_protocol
  LoadBalancerId:
    To: load_balancer_id
  Mss:
    To: mss
  ProxyProtocolEnabled:
    To: proxy_protocol_enabled
  ProxyProtocolV2Config:
    To: proxy_protocol_config
    Type: Map
    Schema:
      Ppv2PrivateLinkEpIdEnabled:
        To: proxy_protocol_config_private_link_ep_id_enabled
      Ppv2PrivateLinkEpsIdEnabled:
        To: proxy_protocol_config_private_link_eps_id_enabled
      Ppv2VpcIdEnabled:
        To: proxy_protocol_config_vpc_id_enabled
  SecSensorEnabled:
    To: sec_sensor_enabled
  SecurityPolicyId:
    To: security_policy_id
  ServerGroupId:
    To: server_group_id
  ServerGroupTuples:
    Ignore: true
  StartPort:
    To: start_port
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  ListenerId:
    To: id
  ListenerPort:
    To: listener_port
