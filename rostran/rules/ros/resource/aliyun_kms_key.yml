Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::KMS::Key
  To: alicloud_kms_key
Properties:
  DKMSInstanceId:
    To: dkms_instance_id
  DeletionProtection:
    To: deletion_protection
  Description:
    To: description
  Enable:
    To: is_enabled
  Enable$$0:
    To: key_state
  EnableAutomaticRotation:
    To: automatic_rotation
  KeySpec:
    To: key_spec
  KeyUsage:
    To: key_usage
  PendingWindowInDays:
    To: deletion_window_in_days
  PendingWindowInDays$$0:
    To: pending_window_in_days
  Policy:
    To: policy
  ProtectionLevel:
    To: protection_level
  RotationInterval:
    To: rotation_interval
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  KeyId:
    To: id
