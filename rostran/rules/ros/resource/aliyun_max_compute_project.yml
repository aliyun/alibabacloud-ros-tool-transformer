Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::MaxCompute::Project
  To: alicloud_maxcompute_project
Properties:
  ChargeType:
    Ignore: true
  Comment:
    To: comment
  DefaultQuota:
    To: default_quota
  IpWhiteList:
    To: ip_white_list
    Type: Map
    Schema:
      IpList:
        To: ip_list
      VpcIpList:
        To: vpc_ip_list
  Name:
    To: project_name
  Properties:
    To: properties
    Type: Map
    Schema:
      AllowFullScan:
        To: allow_full_scan
      EnableDecimal2:
        To: enable_decimal2
      Encryption:
        To: encryption
      RetentionDays:
        To: retention_days
      SqlMeteringMax:
        To: sql_metering_max
      TypeSystem:
        To: type_system
  SupportSchemaLevels:
    To: three_tier_model
Attributes:
  Name:
    To: id
