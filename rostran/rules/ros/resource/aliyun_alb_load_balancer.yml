Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ALB::LoadBalancer
  To: alicloud_alb_load_balancer
Properties:
  AccessLogConfig:
    To: access_log_config
    Type: Map
    Schema:
      Enable:
        Ignore: true
      LogProject:
        To: log_project
      LogStore:
        To: log_store
  AddressAllocatedMode:
    To: address_allocated_mode
  AddressIpVersion:
    To: address_ip_version
  AddressType:
    To: address_type
  BandwidthPackageId:
    To: bandwidth_package_id
  DeletionProtectionEnabled:
    To: deletion_protection_enabled
  Ipv6AddressType:
    To: ipv6_address_type
  LoadBalancerBillingConfig:
    To: load_balancer_billing_config
    Type: Map
    Schema:
      PayType:
        To: pay_type
        Handler: handle_pay_type(PayAsYouGo, PrePay)
  LoadBalancerEdition:
    To: load_balancer_edition
  LoadBalancerName:
    To: load_balancer_name
  ModificationProtectionConfig:
    To: modification_protection_config
    Type: Map
    Schema:
      Reason:
        To: reason
      Status:
        To: status
  ResourceGroupId:
    To: resource_group_id
  SecurityGroupIds:
    Ignore: true
  Tags:
    To: tags
    Handler: handle_tags
  VpcId:
    To: vpc_id
  ZoneMappings:
    To: zone_mappings
    Type: List
    Schema:
      AllocationId:
        Ignore: true
      EipType:
        Ignore: true
      IntranetAddress:
        Ignore: true
      LoadBalancerAddresses:
        To: load_balancer_addresses
        Type: List
        Schema:
          AllocationId:
            To: allocation_id
          EipType:
            To: eip_type
          IntranetAddress:
            To: address
      VSwitchId:
        To: vswitch_id
      ZoneId:
        To: zone_id
Attributes:
  AddressType:
    To: address_type
  Arn:
    Ignore: true
  DNSName:
    To: dns_name
  LoadBalancerEdition:
    To: load_balancer_edition
  LoadBalancerId:
    To: id
  VpcId:
    To: vpc_id
  ZoneMappings:
    To: zone_mappings
