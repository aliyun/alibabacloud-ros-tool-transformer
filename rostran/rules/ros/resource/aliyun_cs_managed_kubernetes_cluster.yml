Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CS::ManagedKubernetesCluster
  To: alicloud_cs_managed_kubernetes
Properties:
  Addons:
    To: addons
    Type: List
    Schema:
      Config:
        To: config
      Disabled:
        To: disabled
      Name:
        To: name
      Version:
        To: version
  ClusterSpec:
    To: cluster_spec
  DeleteOptions:
    To: delete_options
    Type: List
    Schema:
      DeleteMode:
        To: delete_mode
      ResourceType:
        To: resource_type
  DeletionProtection:
    To: deletion_protection
  EncryptionProviderKey:
    To: encryption_provider_key
  CloudMonitorFlags:
    To: install_cloud_monitor
  IsEnterpriseSecurityGroup:
    To: is_enterprise_security_group
  KeyPair:
    To: key_name
  LoadBalancerSpec:
    To: load_balancer_spec
  Name:
    To: name
  NodeCidrMask:
    To: node_cidr_mask
  NodeNameMode:
    To: node_name_mode
  OsType:
    To: os_type
  LoginPassword:
    To: password
  Platform:
    To: platform
  PodVswitchIds:
    To: pod_vswitch_ids
  ProxyMode:
    To: proxy_mode
  ResourceGroupId:
    To: resource_group_id
  SecurityGroupId:
    To: security_group_id
  ServiceCidr:
    To: service_cidr
  UserData:
    To: user_data
  KubernetesVersion:
    To: version
  VpcId:
    To: vpc_id
  VSwitchIds:
    To: vswitch_ids
  SocEnabled:
    Ignore: true
  Tags:
    To: tags
    Handler: handle_tags
  KeepInstanceName:
    Ignore: true
  EndpointPublicAccess:
    To: slb_internet_enabled
  ControlPlaneLogProject:
    To: control_plane_log_project
  ContainerCidr:
    To: pod_cidr
  SnatEntry:
    To: new_nat_gateway
  Runtime:
    To: runtime
  TimeoutMins:
    Ignore: true
  ControlPlaneLogTtl:
    To: control_plane_log_ttl
  ZoneIds:
    To: zone_ids
  MaintenanceWindow:
    To: maintenance_window
    Type: Map
    Schema:
      Duration:
        To: duration
      Enable:
        To: enable
      MaintenanceTime:
        To: maintenance_time
      WeeklyPeriod:
        To: weekly_period
      Recurrence:
        Ignore: true
  ControlPlaneLogComponents:
    To: control_plane_log_components
  SecurityHardeningOs:
    Ignore: true
  Taint:
    To: taints
  NodePools:
    Ignore: true
  FormatDisk:
    Ignore: true
  AutoMode:
    To: auto_mode
    Type: Map
    Schema:
      Enable:
        Ignore: true
  RrsaConfig:
    To: enable_rrsa
    Type: Map
    Schema:
      Enabled:
        To: enabled
  IpStack:
    To: ip_stack
  LoginPassword$$0:
    To: password
  TimeZone:
    To: timezone
Attributes:
  ClusterId:
    To: id
  Nodes:
    To: worker_nodes
  IngressSLBId:
    Ignore: true
  ScalingConfigurationId:
    Ignore: true
  ScalingGroupId:
    Ignore: true
  PrivateUserKubConfig:
    Ignore: true
  TaskId:
    Ignore: true
  APIServerSLBId:
    To: slb_id
  DefaultUserKubeConfig:
    Ignore: true
  WorkerRamRoleName:
    To: worker_ram_role_name
  ScalingRuleId:
    Ignore: true
