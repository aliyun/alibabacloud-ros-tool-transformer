Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SLB::VServerGroup
  To: alicloud_slb_server_group
Properties:
  BackendServers:
    To: servers
    Type: List
    Schema:
      Description:
        Ignore: true
      Port:
        To: port
      ServerId:
        To: server_ids
        Handler: select_first
      ServerIp:
        Ignore: true
      Type:
        Ignore: true
      Weight:
        To: weight
  LoadBalancerId:
    To: load_balancer_id
  Tags:
    To: tags
    Handler: handle_tags
  VServerGroupName:
    To: name
Attributes:
  Arn:
    Ignore: true
  BackendServers:
    Ignore: true
  LoadBalancerId:
    To: load_balancer_id
  VServerGroupId:
    To: id
