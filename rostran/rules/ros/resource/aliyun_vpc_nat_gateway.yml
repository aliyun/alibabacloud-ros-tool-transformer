Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::VPC::NatGateway
  To: alicloud_nat_gateway
Properties:
  AccessMode:
    To: access_mode
    Type: Map
    Schema:
      ModeValue:
        To: mode_value
      TunnelType:
        To: tunnel_type
  AutoPay:
    Ignore: true
  AvailabilityMode:
    Ignore: true
  DeletionForce:
    To: force
  DeletionProtection:
    To: deletion_protection
  Description:
    To: description
  Duration:
    To: period
  EipBindMode:
    To: eip_bind_mode
  IcmpReplyEnabled:
    To: icmp_reply_enabled
  InstanceChargeType:
    To: instance_charge_type
  InstanceChargeType$$0:
    To: payment_type
  InternetChargeType:
    To: internet_charge_type
  Ipv4Prefix:
    Ignore: true
  NatGatewayName:
    To: nat_gateway_name
  NatGatewayName$$0:
    To: nat_gateway_name
  NatIp:
    Ignore: true
  NatType:
    To: nat_type
  NetworkType:
    To: network_type
  PricingCycle:
    Ignore: true
  PrivateLinkEnabled:
    To: private_link_enabled
  SecurityProtectionEnabled:
    Ignore: true
  Tags:
    To: tags
    Handler: handle_tags
  VSwitchId:
    To: vswitch_id
  VpcId:
    To: vpc_id
Attributes:
  ForwardTableId:
    To: forward_table_ids
  NatGatewayId:
    To: id
  SNatTableId:
    To: snat_table_ids
