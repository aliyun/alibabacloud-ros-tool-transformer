Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CLOUDFW::Instance
  To: alicloud_cloud_firewall_instance
Properties:
  AccountNum:
    To: account_number
  AclExtension:
    Ignore: true
  AutoPay:
    Ignore: true
  AutoRenew:
    To: renewal_duration
  AutoRenew$$0:
    To: renewal_status
  Bandwidth:
    To: band_width
  IgnoreExisting:
    Ignore: true
  IpNum:
    To: ip_number
  LogAnalysis:
    To: cfw_log
  LogStorage:
    To: cfw_log_storage
  MultiAccountManagement:
    To: cfw_account
  NatBandwidth:
    Ignore: true
  NatFirewallNum:
    Ignore: true
  PayType:
    To: payment_type
  Period:
    To: period
  PeriodUnit:
    To: renewal_duration_unit
  Spec:
    To: spec
  VpcBandwidth:
    Ignore: true
  VpcFirewallNum:
    To: fw_vpc_number
Attributes:
  InstanceId:
    To: status
