Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::MNS::Queue
  To: alicloud_message_service_queue
Properties:
  DelaySeconds:
    To: delay_seconds
  LoggingEnabled:
    To: logging_enabled
  MaximumMessageSize:
    To: maximum_message_size
  MessageRetentionPeriod:
    To: message_retention_period
  PollingWaitSeconds:
    To: polling_wait_seconds
  QueueName:
    To: queue_name
  VisibilityTimeout:
    To: visibility_timeout
  DlqPolicy:
    To: dlq_policy
    Type: Map
    Schema:
      DeadLetterTargetQueue:
        To: dead_letter_target_queue
      Enabled:
        To: enabled
      MaxReceiveCount:
        To: max_receive_count
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  QueueName:
    To: id
  QueueName$$0:
    To: queue_name
  ARN.WithSlash:
    Ignore: true
  QueueUrl:
    Ignore: true
