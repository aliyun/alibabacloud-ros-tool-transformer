Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::FC::Service
  To: alicloud_fc_service
Properties:
  DeletionForce:
    Ignore: true
  Description:
    To: description
  InternetAccess:
    To: internet_access
  LogConfig:
    To: log_config
    Type: Map
    Schema:
      EnableRequestMetrics:
        Ignore: true
      LogBeginRule:
        Ignore: true
      Logstore:
        To: logstore
      Project:
        To: project
  NasConfig:
    To: nas_config
    Type: Map
    Schema:
      GroupId:
        To: group_id
      MountPoints:
        To: mount_points
      UserId:
        To: user_id
  OssMountConfig:
    Ignore: true
  Role:
    To: role
  ServiceName:
    To: name
  ServiceName$$0:
    To: name_prefix
  Tags:
    To: tags
    Handler: handle_tags
  TracingConfig:
    To: tracing_config
    Type: Map
    Schema:
      Params:
        To: params
      Type:
        To: type
  VpcBindings:
    Ignore: true
  VpcConfig:
    To: vpc_config
    Type: Map
    Schema:
      SecurityGroupId:
        To: security_group_id
      VSwitchIds:
        Ignore: true
      VpcId:
        To: vpc_id
      ZoneId:
        Ignore: true
Attributes:
  InternetAccess:
    To: internet_access
  LogProject:
    Ignore: true
  Logstore:
    Ignore: true
  Role:
    To: role
  ServiceId:
    To: id
  ServiceId$$0:
    To: service_id
  ServiceName:
    Ignore: true
  Tags:
    To: tags
    Handler: handle_tags
  VpcId:
    Ignore: true
