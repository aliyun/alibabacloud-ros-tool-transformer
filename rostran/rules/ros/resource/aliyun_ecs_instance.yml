Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ECS::Instance
  To: alicloud_instance
Properties:
  Affinity:
    Ignore: true
  AllocatePublicIP:
    To: allocate_public_ip
  AutoRenew:
    To: renewal_status
  AutoRenewPeriod:
    To: auto_renew_period
  CreditSpecification:
    To: credit_specification
  DedicatedHostId:
    To: dedicated_host_id
  DeletionProtection:
    To: deletion_protection
  DeploymentSetGroupNo:
    To: deployment_set_group_no
  DeploymentSetId:
    To: deployment_set_id
  Description:
    To: description
  DiskMappings:
    To: data_disks
    Type: List
    Schema:
      Category:
        To: category
      Description:
        To: description
      Device:
        To: device
      DiskName:
        To: name
      PerformanceLevel:
        To: performance_level
      Size:
        To: size
      SnapshotId:
        To: snapshot_id
  HostName:
    To: host_name
  HpcClusterId:
    To: hpc_cluster_id
  HttpEndpoint:
    To: http_endpoint
  HttpTokens:
    To: http_tokens
  ImageFamily:
    To: image_options
  ImageId:
    To: image_id
    Handler: handle_image_id
  InstanceChargeType:
    To: instance_charge_type
    Handler: handle_instance_charge_type
  InstanceName:
    To: instance_name
  InstanceType:
    To: instance_type
  InternetChargeType:
    To: internet_charge_type
  InternetMaxBandwidthOut:
    To: internet_max_bandwidth_out
  IoOptimized:
    To: io_optimized
  KeyPairName:
    To: key_name
  Password:
    To: password
  PasswordInherit:
    To: password_inherit
  Period:
    To: period
  PeriodUnit:
    To: period_unit
  PrivateIpAddress:
    To: private_ip
  PrivatePoolOptions:
    To: private_pool_options_id
  PrivatePoolOptions$$0:
    To: private_pool_options_match_criteria
  RamRoleName:
    To: role_name
  ResourceGroupId:
    To: resource_group_id
  SecurityEnhancementStrategy:
    To: security_enhancement_strategy
  SecurityGroupId:
    To: security_groups
    Handler: handle_to_list
  SecurityGroupIds:
    To: security_groups
  SpotDuration:
    To: spot_duration
  SpotInterruptionBehavior:
    To: spot_interruption_behavior
  SpotPriceLimit:
    To: spot_price_limit
  SpotStrategy:
    To: spot_strategy
  StorageSetId:
    To: system_disk_storage_cluster_id
  StorageSetPartitionNumber:
    Ignore: true
  SubscriptionDeletionForce:
    To: force_delete
  SystemDiskCategory:
    To: system_disk_category
  SystemDiskDescription:
    To: system_disk_description
  SystemDiskDiskName:
    To: system_disk_name
  SystemDiskPerformanceLevel:
    To: system_disk_performance_level
  SystemDiskSize:
    To: system_disk_size
  Tags:
    To: tags
    Handler: handle_tags
  Tenancy:
    Ignore: true
  UseAdditionalService:
    Ignore: true
  UserData:
    To: user_data
  VSwitchId:
    To: vswitch_id
  VpcId:
    To: vpc_id
  ZoneId:
    To: availability_zone
  ZoneIds:
    Ignore: true
Attributes:
  HostName:
    To: host_name
  InnerIp:
    Ignore: true
  InstanceId:
    To: id
  PrimaryNetworkInterfaceId:
    To: network_interface_id
  PrivateIp:
    To: private_ip
  PrivateIp$$0:
    To: private_ip
  PublicIp:
    To: public_ip
  SecurityGroupIds:
    Ignore: true
  ZoneId:
    To: availability_zone
