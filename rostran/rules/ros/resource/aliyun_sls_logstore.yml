Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SLS::Logstore
  To: alicloud_log_store
Properties:
  AppendMeta:
    To: append_meta
  AutoSplit:
    To: auto_split
  EnableTracking:
    To: enable_web_tracking
  EncryptConf:
    To: encrypt_conf
    Type: Map
    Schema:
      Enable:
        To: enable
      EncryptType:
        To: encrypt_type
      UserCmkInfo:
        To: user_cmk_info
  LogstoreName:
    To: logstore_name
  LogstoreName$$0:
    To: name
  MaxSplitShard:
    To: max_split_shard_count
  Mode:
    To: mode
  PreserveStorage:
    Ignore: true
  ProjectName:
    To: project
  ProjectName$$0:
    To: project_name
  ShardCount:
    To: shard_count
  TTL:
    To: retention_period
Attributes:
  LogstoreName:
    To: logstore_name
  LogstoreName$$0:
    To: name
  ProjectName:
    To: project_name
