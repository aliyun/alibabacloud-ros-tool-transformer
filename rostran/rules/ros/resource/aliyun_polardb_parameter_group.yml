Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::POLARDB::ParameterGroup
  To: alicloud_polardb_parameter_group
Properties:
  DbType:
    To: db_type
  DbVersion:
    To: db_version
  ParameterGroupDesc:
    To: description
  ParameterGroupName:
    To: name
  ParameterGroupName$$0:
    To: parameter_group_name
  Parameters:
    To: parameters
    Type: List
    Schema:
      ParamName:
        To: param_name
      ParamValue:
        To: param_value
  ResourceGroupId:
    Ignore: true
Attributes:
  CreateTime:
    To: create_time
  DbType:
    To: db_type
  DbVersion:
    To: db_version
  ForceRestart:
    Ignore: true
  ParameterCounts:
    Ignore: true
  ParameterGroupDesc:
    To: description
  ParameterGroupId:
    To: id
  ParameterGroupName:
    To: name
  ParameterGroupType:
    Ignore: true
  Parameters:
    To: parameters
