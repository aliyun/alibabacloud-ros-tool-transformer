Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ROCKETMQ5::Instance
  To: alicloud_rocketmq_instance
Properties:
  AutoRenew:
    To: auto_renew
  AutoRenewPeriod:
    To: auto_renew_period
  InstanceName:
    To: instance_name
  PaymentType:
    To: payment_type
  Period:
    To: period
  PeriodUnit:
    To: period_unit
  Remark:
    To: remark
  ResourceGroupId:
    To: resource_group_id
  SeriesCode:
    To: series_code
  SubSeriesCode:
    To: sub_series_code
  ProductInfo:
    To: product_info
    Type: Map
    Schema:
      AutoScaling:
        To: auto_scaling
      MessageRetentionTime:
        To: message_retention_time
      MsgProcessSpec:
        To: msg_process_spec
      SendReceiveRatio:
        To: send_receive_ratio
      CapacityType:
        Ignore: true
      ProvisionedCapacity:
        Ignore: true
  InternetInfo:
    To: flow_out_bandwidth
  VpcInfo:
    To: network_info
    Type: Map
    Schema:
      SecurityGroupId:
        Ignore: true
      VpcId:
        Ignore: true
      VSwitchId:
        Ignore: true
      VSwitchIds:
        Ignore: true
  InternetInfo$$0:
    To: internet_spec
  VpcInfo$$0:
    To: vswitches
    Type: Map
    Schema:
      VSwitchId:
        To: vswitch_id
      VpcId:
        Ignore: true
      SecurityGroupId:
        Ignore: true
      VSwitchIds:
        Ignore: true
Attributes:
  InstanceId:
    To: id
  InstanceName:
    To: instance_name
  InternetEndpoint:
    Ignore: true
  VpcEndpoint:
    Ignore: true
