Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SchedulerX::AppGroup
  To: alicloud_schedulerx_app_group
Properties:
  AppKey:
    Ignore: true
  AppName:
    To: app_name
  AppType:
    To: app_type
  AppVersion:
    To: app_version
  Description:
    To: description
  EnableLog:
    To: enable_log
  GroupId:
    To: group_id
  MaxJobs:
    To: max_jobs
  MonitorConfig:
    To: monitor_config_json
  MonitorContacts:
    To: monitor_contacts_json
  Namespace:
    To: namespace
  NamespaceName:
    To: namespace_name
  NamespaceSource:
    To: namespace_source
  NotificationPolicyName:
    Ignore: true
  ScheduleBusyWorkers:
    To: schedule_busy_workers
Attributes:
  AppGroupId:
    To: id
