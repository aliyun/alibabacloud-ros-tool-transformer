Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::DNS::AccessStrategy
  To: alicloud_alidns_access_strategy
Properties:
  AccessMode:
    To: access_mode
  DefaultAddrPool:
    To: default_addr_pools
    Type: List
    Schema:
      Id:
        Ignore: true
      LbaWeight:
        To: lba_weight
  DefaultAddrPoolType:
    To: default_addr_pool_type
  DefaultLatencyOptimization:
    To: default_latency_optimization
  DefaultLbaStrategy:
    To: default_lba_strategy
  DefaultMaxReturnAddrNum:
    To: default_max_return_addr_num
  DefaultMinAvailableAddrNum:
    To: default_min_available_addr_num
  FailoverAddrPool:
    To: failover_addr_pools
    Type: List
    Schema:
      Id:
        Ignore: true
      LbaWeight:
        To: lba_weight
  FailoverAddrPoolType:
    To: failover_addr_pool_type
  FailoverLatencyOptimization:
    To: failover_latency_optimization
  FailoverLbaStrategy:
    To: failover_lba_strategy
  FailoverMaxReturnAddrNum:
    To: failover_max_return_addr_num
  FailoverMinAvailableAddrNum:
    To: failover_min_available_addr_num
  InstanceId:
    To: instance_id
  Lines:
    To: lines
    Type: List
  StrategyMode:
    To: strategy_mode
  StrategyName:
    To: strategy_name
Attributes:
  StrategyId:
    To: id
