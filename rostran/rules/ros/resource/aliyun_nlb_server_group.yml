Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::NLB::ServerGroup
  To: alicloud_nlb_server_group
Properties:
  AddressIPVersion:
    To: address_ip_version
  AnyPortEnabled:
    To: any_port_enabled
  ConnectionDrainEnabled:
    To: connection_drain_enabled
  ConnectionDrainTimeout:
    To: connection_drain_timeout
  HealthCheckConfig:
    To: health_check
    Type: Map
    Schema:
      HealthCheckConnectPort:
        To: health_check_connect_port
      HealthCheckConnectTimeout:
        To: health_check_connect_timeout
      HealthCheckDomain:
        To: health_check_domain
      HealthCheckEnabled:
        To: health_check_enabled
      HealthCheckHttpCode:
        To: health_check_http_code
      HealthCheckInterval:
        To: health_check_interval
      HealthCheckType:
        To: health_check_type
      HealthCheckUrl:
        To: health_check_url
      HealthyThreshold:
        To: healthy_threshold
      HttpCheckMethod:
        To: http_check_method
      UnhealthyThreshold:
        To: unhealthy_threshold
  PersistenceEnabled:
    Ignore: true
  PersistenceTimeout:
    Ignore: true
  PreserveClientIpEnabled:
    To: preserve_client_ip_enabled
  Protocol:
    To: protocol
  ResourceGroupId:
    To: resource_group_id
  Scheduler:
    To: scheduler
  ServerGroupName:
    To: server_group_name
  ServerGroupType:
    To: server_group_type
  Servers:
    Ignore: true
  Tags:
    To: tags
    Handler: handle_tags
  VpcId:
    To: vpc_id
Attributes:
  ServerGroupId:
    To: id
