Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CEN::CenInstance
  To: alicloud_cen_instance
Properties:
  Description:
    To: description
  Name:
    To: name
  ProtectionLevel:
    To: protection_level
  ResourceGroupId:
    To: resource_group_id
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  Arn:
    Ignore: true
  CenId:
    To: id
