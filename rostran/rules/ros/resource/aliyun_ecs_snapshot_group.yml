Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ECS::SnapshotGroup
  To: alicloud_ecs_snapshot_group
Properties:
  Description:
    To: description
  DiskIds:
    To: disk_id
  ExcludeDiskIds:
    To: exclude_disk_id
  InstanceId:
    To: instance_id
  Name:
    To: snapshot_group_name
  ResourceGroupId:
    To: resource_group_id
  Tags:
    To: tags
    Handler: handle_tags
Attributes:
  SnapshotGroupId:
    To: id
