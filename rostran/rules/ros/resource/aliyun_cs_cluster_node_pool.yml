Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CS::ClusterNodePool
  To: alicloud_cs_kubernetes_node_pool
Properties:
  ClusterId:
    To: cluster_id
  AutoScaling:
    To: compensate_with_on_demand
  Count:
    To: desired_size
  ScalingGroup:
    To: auto_renew
  KubernetesConfig:
    To: cpu_policy
  Management:
    To: management
    Type: Map
    Schema:
      AutoRepair:
        To: auto_repair
      Enable:
        To: enable
      UpgradeConfig:
        Ignore: true
  NodePoolInfo:
    To: auto_mode
    Type: Map
    Schema:
      Name:
        Ignore: true
      ResourceGroupId:
        Ignore: true
  TeeConfig:
    To: tee_config
    Type: Map
    Schema:
      TeeEnable:
        To: tee_enable
  ScalingGroup$$0:
    To: vswitch_ids
  NodePoolInfo$$0:
    To: vul_level
  KubernetesConfig$$0:
    To: taints
    Type: Map
    Schema:
      NodeNameMode:
        Ignore: true
      Runtime:
        Ignore: true
      Unschedulable:
        Ignore: true
      RuntimeVersion:
        Ignore: true
      Taints:
        Ignore: true
      UserData:
        Ignore: true
      CmsEnabled:
        Ignore: true
      CpuPolicy:
        Ignore: true
      Labels:
        Ignore: true
  AutoScaling$$0:
    To: spot_strategy
Attributes:
  NodePoolId:
    To: id
  NodePoolId$$0:
    To: node_pool_id
