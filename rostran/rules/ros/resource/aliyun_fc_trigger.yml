Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::FC::Trigger
  To: alicloud_fc_trigger
Properties:
  FunctionName:
    To: function
  InvocationRole:
    To: role
  Qualifier:
    Ignore: true
  ServiceName:
    To: service
  SourceArn:
    To: source_arn
  TriggerConfig:
    To: config
  TriggerConfig$$0:
    To: config_mns
  TriggerName:
    To: name
  TriggerName$$0:
    To: name_prefix
  TriggerType:
    To: type
Attributes:
  FunctionName:
    Ignore: true
  ServiceName:
    Ignore: true
  TriggerId:
    To: trigger_id
  TriggerName:
    Ignore: true
  UrlInternet:
    Ignore: true
  UrlIntranet:
    Ignore: true
