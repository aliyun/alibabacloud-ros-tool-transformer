Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::HBase::Cluster
  To: alicloud_hbase_instance
Properties:
  AutoRenewPeriod:
    To: auto_renew
  ClusterName:
    To: name
  ColdStorageSize:
    To: cold_storage_size
  CoreInstanceType:
    To: core_instance_type
  DeletionProtection:
    To: deletion_protection
  DiskSize:
    To: core_disk_size
  DiskType:
    Ignore: true
  EncryptionKey:
    Ignore: true
  Engine:
    To: engine
  EngineVersion:
    To: engine_version
  MasterInstanceType:
    To: master_instance_type
  NodeCount:
    Ignore: true
  PayType:
    To: pay_type
  Period:
    To: duration
  PeriodUnit:
    Ignore: true
  ResourceGroupId:
    Ignore: true
  SecurityIPList:
    To: ip_white
  VSwitchId:
    To: vswitch_id
  VpcId:
    To: vpc_id
  ZoneId:
    To: zone_id
Attributes:
  ClusterId:
    To: id
  ServiceConnAddrs:
    Ignore: true
  SlbConnAddrs:
    Ignore: true
  ThriftConn:
    Ignore: true
  UiProxyConnAddrInfo:
    Ignore: true
  ZkConnAddrs:
    Ignore: true
