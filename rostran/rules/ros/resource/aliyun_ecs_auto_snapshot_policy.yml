Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ECS::AutoSnapshotPolicy
  To: alicloud_ecs_auto_snapshot_policy
Properties:
  AutoSnapshotPolicyName:
    To: name
  AutoSnapshotPolicyName$$0:
    To: name
  CopiedSnapshotsRetentionDays:
    To: copied_snapshots_retention_days
  CopyEncryptionConfiguration:
    To: copy_encryption_configuration
    Type: Map
    Schema:
      Encrypted:
        To: encrypted
      KMSKeyId:
        To: kms_key_id
  DiskIds:
    Ignore: true
  EnableCrossRegionCopy:
    To: enable_cross_region_copy
  RepeatWeekdays:
    To: repeat_weekdays
  ResourceGroupId:
    To: resource_group_id
  RetentionDays:
    To: retention_days
  Tags:
    To: tags
    Handler: handle_tags
  TargetCopyRegions:
    To: target_copy_regions
  TimePoints:
    To: time_points
Attributes:
  Arn:
    Ignore: true
  AutoSnapshotPolicyId:
    To: id
