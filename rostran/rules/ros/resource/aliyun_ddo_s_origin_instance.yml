Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::DDoS::OriginInstance
  To: alicloud_ddosbgp_instance
Properties:
  Period:
    To: period
  Tags:
    To: tags
    Handler: handle_tags
  PeriodUnit:
    Ignore: true
  ProtectionMode:
    Ignore: true
  NetworkProtocol:
    To: ip_type
  Edition:
    To: type
  IpAddresses:
    To: ip_count
  EnableLog:
    Ignore: true
  ChargeType:
    Ignore: true
  CleanBandwidth:
    To: bandwidth
  CleanBandwidth$$0:
    To: normal_bandwidth
Attributes:
  InstanceId:
    To: id
  Arn:
    Ignore: true
