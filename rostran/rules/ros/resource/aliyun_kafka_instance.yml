Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::KAFKA::Instance
  To: alicloud_alikafka_instance
Properties:
  DeletionForce:
    Ignore: true
  DeployOption:
    To: selected_zones
  DeployOption$$0:
    To: zone_id
  DeployType:
    To: deploy_type
  DiskSize:
    To: disk_size
  DiskType:
    To: disk_type
  EipMax:
    To: eip_max
  IoMax:
    To: io_max
  IoMaxSpec:
    To: io_max_spec
  OpenConnector:
    Ignore: true
  PartitionNum:
    To: partition_num
  PayType:
    To: paid_type
  ServerlessConfig:
    To: serverless_config
    Type: Map
    Schema:
      ReservedPublishCapacity:
        To: reserved_publish_capacity
      ReservedSubscribeCapacity:
        To: reserved_subscribe_capacity
  SpecType:
    To: spec_type
  Tags:
    To: tags
    Handler: handle_tags
  TopicQuota:
    To: topic_quota
Attributes:
  Arn:
    Ignore: true
  DomainEndpoint:
    To: domain_endpoint
  Endpoint:
    To: end_point
  InstanceId:
    To: id
  Name:
    To: name
  OrderId:
    Ignore: true
  SaslDomainEndpoint:
    To: sasl_domain_endpoint
  SslDomainEndpoint:
    To: ssl_domain_endpoint
  SslEndpoint:
    To: ssl_endpoint
