Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::NLB::LoadBalancer
  To: alicloud_nlb_load_balancer
Properties:
  AddressIpVersion:
    To: address_ip_version
  AddressType:
    To: address_type
  BandwidthPackageId:
    To: bandwidth_package_id
  CrossZoneEnabled:
    To: cross_zone_enabled
  DeletionProtectionConfig:
    To: deletion_protection_config
    Type: Map
    Schema:
      Enabled:
        To: enabled
      Reason:
        To: reason
  LoadBalancerBillingConfig:
    To: payment_type
  LoadBalancerName:
    To: load_balancer_name
  LoadBalancerType:
    To: load_balancer_type
  ModificationProtectionConfig:
    To: modification_protection_config
    Type: Map
    Schema:
      Reason:
        To: reason
      Status:
        To: status
  ResourceGroupId:
    To: resource_group_id
  Tags:
    To: tags
    Handler: handle_tags
  TrafficAffinityEnabled:
    Ignore: true
  VpcId:
    To: vpc_id
  ZoneMappings:
    To: zone_mappings
    Type: List
    Schema:
      AllocationId:
        To: allocation_id
      EipType:
        Ignore: true
      LoadBalancerAddresses:
        Ignore: true
      PrivateIPv4Address:
        Ignore: true
      VSwitchId:
        Ignore: true
      ZoneId:
        To: zone_id
Attributes:
  AddressIpVersion:
    To: address_ip_version
  AddressType:
    To: address_type
  Arn:
    Ignore: true
  DNSName:
    To: dns_name
  LoadBalancerId:
    To: id
  LoadBalancerType:
    To: load_balancer_type
  VpcId:
    To: vpc_id
  ZoneMappings:
    To: zone_mappings
