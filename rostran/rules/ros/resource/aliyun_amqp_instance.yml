Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::AMQP::Instance
  To: alicloud_amqp_instance
Properties:
  InstanceName:
    To: instance_name
  InstanceType:
    To: instance_type
  MaxEipTps:
    To: max_eip_tps
  MaxTps:
    To: max_tps
  OrderNum:
    Ignore: true
  PayType:
    To: payment_type
  Period:
    To: period
  PeriodUnit:
    To: period_cycle
  QueueCapacity:
    To: queue_capacity
  StorageSize:
    To: storage_size
  SupportEip:
    To: support_eip
  SupportTracing:
    To: support_tracing
  TracingStorageTime:
    To: tracing_storage_time
Attributes:
  ClassicEndpoint:
    Ignore: true
  InstanceId:
    To: id
  PrivateEndpoint:
    Ignore: true
  PublicEndpoint:
    Ignore: true
