Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::VPC::VpnConnection
  To: alicloud_vpn_connection
Properties:
  AutoConfigRoute:
    To: auto_config_route
  BgpConfig:
    To: bgp_config
    Type: Map
    Schema:
      EnableBgp:
        Ignore: true
      LocalAsn:
        To: local_asn
      LocalBgpIp:
        To: local_bgp_ip
      TunnelCidr:
        To: tunnel_cidr
  CustomerGatewayId:
    To: customer_gateway_id
  EffectImmediately:
    To: effect_immediately
  EnableDpd:
    To: enable_dpd
  EnableNatTraversal:
    To: enable_nat_traversal
  EnableTunnelsBgp:
    To: enable_tunnels_bgp
  HealthCheckConfig:
    To: health_check_config
    Type: Map
    Schema:
      Dip:
        To: dip
      Enable:
        To: enable
      Interval:
        To: interval
      Policy:
        Ignore: true
      Retry:
        To: retry
      Sip:
        To: sip
  IkeConfig:
    To: ike_config
    Type: Map
    Schema:
      IkeAuthAlg:
        To: ike_auth_alg
      IkeEncAlg:
        To: ike_enc_alg
      IkeLifetime:
        To: ike_lifetime
      IkeMode:
        To: ike_mode
      IkePfs:
        To: ike_pfs
      IkeVersion:
        To: ike_version
      LocalId:
        Ignore: true
      Psk:
        To: psk
      RemoteId:
        Ignore: true
  IpsecConfig:
    To: ipsec_config
  LocalSubnet:
    To: local_subnet
  Name:
    To: name
  RemoteCaCertificate:
    Ignore: true
  RemoteSubnet:
    To: remote_subnet
  TunnelOptionsSpecification:
    To: tunnel_options_specification
    Type: List
    Schema:
      CustomerGatewayId:
        To: customer_gateway_id
      EnableDpd:
        To: enable_dpd
      EnableNatTraversal:
        To: enable_nat_traversal
      RemoteCaCertificate:
        Ignore: true
      Role:
        To: role
      TunnelBgpConfig:
        Ignore: true
      TunnelIkeConfig:
        Ignore: true
      TunnelIpsecConfig:
        Ignore: true
  VpnGatewayId:
    To: vpn_gateway_id
Attributes:
  PeerVpnConnectionConfig:
    Ignore: true
  Status:
    To: status
  VpnConnectionId:
    To: id
