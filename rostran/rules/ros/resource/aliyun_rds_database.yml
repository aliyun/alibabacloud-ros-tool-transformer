Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::RDS::Database
  To: alicloud_db_database
Properties:
  CharacterSetName:
    To: character_set
  DBDescription:
    To: description
  DBInstanceId:
    To: instance_id
  DBName:
    To: name
  DBName$$0:
    To: name
Attributes:
  DBInstanceId:
    Ignore: true
  DBName:
    Ignore: true
