Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::SELECTDB::DBInstance
  To: alicloud_selectdb_db_instance
Properties:
  AccountPassword:
    To: admin_pass
  CacheSize:
    To: cache_size
  ChargeType:
    To: payment_type
  ConnectionString:
    Ignore: true
  DBInstanceClass:
    To: db_instance_class
  DBInstanceDescription:
    To: db_instance_description
  Engine:
    Ignore: true
  EngineVersion:
    To: engine_minor_version
  Period:
    To: period
  ResourceGroupId:
    Ignore: true
  SecurityIPList:
    To: desired_security_ip_lists
    Type: List
  Tags:
    To: tags
    Handler: handle_tags
  UsedTime:
    To: period_time
  VSwitchId:
    To: vswitch_id
  VpcId:
    To: vpc_id
  ZoneId:
    To: zone_id
Attributes:
  DBInstanceId:
    To: id
  VpcConnectionString:
    Ignore: true
