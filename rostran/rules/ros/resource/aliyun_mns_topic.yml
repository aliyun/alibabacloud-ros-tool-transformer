Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::MNS::Topic
  To: alicloud_message_service_topic
Properties:
  LoggingEnabled:
    To: logging_enabled
  LoggingEnabled$$0:
    To: logging_enabled
  MaximumMessageSize:
    To: max_message_size
  Tags:
    To: tags
    Handler: handle_tags
  TopicName:
    To: topic_name
Attributes:
  ARN.WithSlash:
    Ignore: true
  TopicName:
    To: id
  TopicName$$0:
    To: topic_name
  TopicUrl:
    Ignore: true
