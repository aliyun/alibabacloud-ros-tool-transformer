Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::CloudStorageGateway::Gateway
  To: alicloud_cloud_storage_gateway_gateway
Properties:
  Category:
    Ignore: true
  Description:
    To: description
  GatewayClass:
    To: gateway_class
  Location:
    To: location
  Name:
    To: gateway_name
  PostPaid:
    Ignore: true
  PublicNetworkBandwidth:
    To: public_network_bandwidth
  ReleaseAfterExpiration:
    To: release_after_expiration
  ResourceRegionId:
    Ignore: true
  SecondaryVSwitchId:
    Ignore: true
  StorageBundleId:
    To: storage_bundle_id
  Type:
    To: type
  UntrustedEnvId:
    Ignore: true
  UntrustedEnvInstanceType:
    Ignore: true
  VSwitchId:
    To: vswitch_id
Attributes:
  GatewayId:
    To: id
