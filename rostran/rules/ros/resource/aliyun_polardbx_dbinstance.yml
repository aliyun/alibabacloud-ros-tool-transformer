  From: ALIYUN::PolarDBX::DBInstance
  To: alicloud_drds_polardbx_instance
Properties:
  AutoRenew:
    Ignore: true
  DBInstanceDescription:
    To: description
  DBNodeClass:
    To: cn_class
  DBNodeCount:
    To: cn_node_count
  EngineVersion:
    To: engine_version
  PayType:
    Ignore: true
  Period:
    Ignore: true
  PrimaryZone:
    To: primary_zone
  ResourceGroupId:
    To: resource_group_id
  SecondaryZone:
    To: secondary_zone
