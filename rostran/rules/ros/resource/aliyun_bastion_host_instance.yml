Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::BastionHost::Instance
  To: alicloud_bastionhost_instance
Properties:
  Period:
    To: period
  ResourceGroupId:
    To: resource_group_id
  ExtraBandwidth:
    To: bandwidth
  Plan:
    To: plan_code
  AutoPay:
    Ignore: true
  AutoRenew:
    To: renewal_status
  ExtendedStoragePlans:
    To: storage
  Version:
    To: license_code
  StartInstanceParam:
    Ignore: true
  PeriodUnit:
    To: renewal_period_unit
Attributes:
  InstanceId:
    To: id
