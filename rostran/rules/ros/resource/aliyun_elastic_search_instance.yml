Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::ElasticSearch::Instance
  To: alicloud_elasticsearch_instance
Properties:
  Description:
    To: description
  EnablePublic:
    To: enable_public
  InstanceChargeType:
    To: instance_charge_type
  KibanaWhitelist:
    To: kibana_whitelist
  Password:
    To: password
  Period:
    To: period
  PrivateWhitelist:
    To: private_whitelist
  PublicWhitelist:
    To: public_whitelist
  ResourceGroupId:
    To: resource_group_id
  Tags:
    To: tags
    Handler: handle_tags
  Version:
    To: version
  VSwitchId:
    To: vswitch_id
  ZoneCount:
    To: zone_count
  ZoneId:
    Ignore: true
  InstanceCategory:
    To: instance_category
  MasterNode:
    To: master_configuration
    Type: Map
    Schema:
      Amount:
        To: amount
      DiskType:
        To: disk_type
      Spec:
        To: spec
      DiskSize:
        Ignore: true
  YMLConfig:
    To: setting_config
  DataNode:
    To: data_node_amount
  PeriodUnit:
    To: renewal_duration_unit
  KibanaNode:
    To: kibana_configuration
    Type: Map
    Schema:
      Spec:
        To: spec
  EnableKibanaPrivate:
    To: enable_kibana_private_network
  EnableKibanaPublic:
    To: enable_kibana_public_network
  DataNode$$0:
    To: data_node_spec
  KibanaNode$$0:
    To: kibana_node_spec
  MasterNode$$0:
    To: master_node_spec
  DeleteType:
    Ignore: true
Attributes:
  InstanceId:
    To: id
  Domain:
    To: domain
  InstanceChargeType:
    To: instance_charge_type
  KibanaDomain:
    To: kibana_domain
  KibanaPort:
    To: kibana_port
  Port:
    To: port
  PublicDomain:
    To: public_domain
  Status:
    To: status
  Version:
    To: version
  VSwitchId:
    To: vswitch_id
  Arn:
    Ignore: true
