    Ignore: true
  SshEnable:
    To: ssh_enable
  Tags:
    To: tags
    Handler: handle_tags
  UseCustomHiveMetaDB:
    Ignore: true
  UseLocalMetaDb:
    To: use_local_metadb
  UserDefinedEmrEcsRole:
    To: user_defined_emr_ecs_role
  UserInfo:
    Ignore: true
  VSwitchId:
    To: vswitch_id
  VpcId:
    Ignore: true
  WhiteListType:
    Ignore: true
  ZoneId:
    To: zone_id
