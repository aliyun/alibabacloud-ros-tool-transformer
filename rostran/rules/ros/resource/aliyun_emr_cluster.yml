    Schema:
      AutoRenew:
        To: auto_renew
      ChargeType:
        To: charge_type
      ClusterId:
        Ignore: true
      Comment:
        Ignore: true
      CreateType:
        Ignore: true
      DiskCapacity:
        To: disk_capacity
      DiskCount:
        To: disk_count
      DiskType:
        To: disk_type
      GpuDriver:
        To: gpu_driver
      HostGroupId:
        Ignore: true
      HostGroupName:
        To: host_group_name
      HostGroupType:
        To: host_group_type
      HostKeyPairName:
        Ignore: true
      HostPassword:
        Ignore: true
      InstanceType:
        To: instance_type
      NodeCount:
        To: node_count
      Period:
        To: period
      SysDiskCapacity:
        To: sys_disk_capacity
      SysDiskType:
        To: sys_disk_type
