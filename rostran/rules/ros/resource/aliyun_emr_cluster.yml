    Ignore: true
  InstanceGeneration:
    Ignore: true
  IoOptimized:
    Ignore: true
  IsOpenPublicIp:
    To: is_open_public_ip
  KeyPairName:
    To: key_pair_name
  LogPath:
    Ignore: true
  MachineType:
    To: instance_type
  MasterPwd:
    To: master_pwd
  MetaStoreConf:
    To: meta_store_conf
  MetaStoreType:
    To: meta_store_type
  Name:
    To: name
  NetType:
    Ignore: true
  OptionSoftWareList:
    To: option_software_list
  Period:
    To: period
  RelatedClusterId:
    To: related_cluster_id
