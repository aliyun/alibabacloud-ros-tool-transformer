    Type: List
    Schema:
      Arg:
        To: arg
      Name:
        To: name
      Path:
        To: path
  ChargeType:
    To: charge_type
  ClickHouseConf:
    Ignore: true
  ClusterType:
    To: cluster_type
  Config:
    Ignore: true
  Configurations:
    To: configs
  DepositType:
    To: deposit_type
  EasEnable:
    To: eas_enable
  EmrVer:
    To: emr_ver
  HighAvailabilityEnable:
    To: high_availability_enable
  HostGroup:
    To: host_group
