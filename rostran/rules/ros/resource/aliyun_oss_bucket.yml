Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::OSS::Bucket
  To: alicloud_oss_bucket
Properties:
  AccessControl:
    To: acl
  BlockPublicAccess:
    Ignore: true
  BucketName:
    To: bucket
  CORSConfiguration:
    Ignore: true
  DeletionForce:
    To: force_destroy
  EnableOssHdfsService:
    Ignore: true
  LifecycleConfiguration:
    To: lifecycle_rule
    Type: Map
    Schema:
      Rule:
        Ignore: true
  LoggingConfiguration:
    To: logging
    Type: Map
    Schema:
      TargetBucket:
        To: target_bucket
      TargetPrefix:
        To: target_prefix
  Policy:
    To: policy
  RedundancyType:
    To: redundancy_type
  RefererConfiguration:
    To: referer_config
    Type: Map
    Schema:
      AllowEmptyReferer:
        To: allow_empty
      RefererList:
        To: referers
  ResourceGroupId:
    To: resource_group_id
  ServerSideEncryptionConfiguration:
    To: server_side_encryption_rule
    Type: Map
    Schema:
      KMSMasterKeyID:
        To: kms_master_key_id
      SSEAlgorithm:
        To: sse_algorithm
  StorageClass:
    To: storage_class
  Tags:
    To: tags
    Handler: handle_tags
  VersioningConfiguration:
    To: versioning
    Type: Map
    Schema:
      Status:
        To: status
  WebsiteConfigurationV2:
    To: website
    Type: Map
    Schema:
      ErrorDocument:
        Ignore: true
      IndexDocument:
        Ignore: true
      RoutingRules:
        Ignore: true
Attributes:
  Arn:
    Ignore: true
  DomainName:
    To: extranet_endpoint
  InternalDomainName:
    To: intranet_endpoint
  Name:
    To: id
