Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_slb_master_slave_server_group
  To: ALIYUN::SLB::MasterSlaveServerGroup
Properties:
  delete_protection_validation:
    Ignore: true
  load_balancer_id:
    To: LoadBalancerId
  name:
    To: MasterSlaveServerGroupName
  servers:
    To: MasterSlaveBackendServers
    Type: List
    Schema:
      is_backup:
        Ignore: true
      port:
        To: Port
      server_id:
        To: ServerId
      server_type:
        To: ServerType
      type:
        To: Type
      weight:
        To: Weight
Attributes:
  id:
    To: MasterSlaveServerGroupId
