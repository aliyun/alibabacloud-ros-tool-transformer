Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_alb_listener
  To: ALIYUN::ALB::Listener
Properties:
  access_log_record_customized_headers_enabled:
    To: LogConfig
    Type: Map
  access_log_tracing_config:
    To: LogConfig
    Type: Map
    Schema:
      tracing_enabled:
        Ignore: true
      tracing_sample:
        Ignore: true
      tracing_type:
        Ignore: true
  acl_config:
    Ignore: true
  acl_id:
    Ignore: true
  ca_certificates:
    To: CaCertificates
    Type: List
    Schema:
      certificate_id:
        To: CertificateId
  ca_enabled:
    To: CaEnabled
  certificates:
    To: Certificates
    Type: List
    Schema:
      certificate_id:
        To: CertificateId
  default_actions:
    To: DefaultActions
    Type: List
    Schema:
      forward_group_config:
        Ignore: true
      type:
        To: Type
  dry_run:
    Ignore: true
  gzip_enabled:
    To: GzipEnabled
  http2_enabled:
    To: Http2Enabled
  idle_timeout:
    To: IdleTimeout
  listener_description:
    To: ListenerDescription
  listener_port:
    To: ListenerPort
  listener_protocol:
    To: ListenerProtocol
  load_balancer_id:
    To: LoadBalancerId
  quic_config:
    To: QuicConfig
    Type: Map
    Schema:
      quic_listener_id:
        To: QuicListenerId
      quic_upgrade_enabled:
        To: QuicUpgradeEnabled
  request_timeout:
    To: RequestTimeout
  security_policy_id:
    To: SecurityPolicyId
  server_group_tuples:
    Ignore: true
  status:
    To: ListenerStatus
  tags:
    Ignore: true
  x_forwarded_for_config:
    To: XForwardedForConfig
    Type: Map
    Schema:
      x_forwarded_for_client_cert_client_verify_alias:
        To: XForwardedForClientCertClientVerifyAlias
      x_forwarded_for_client_cert_client_verify_enabled:
        To: XForwardedForClientCertClientVerifyEnabled
      x_forwarded_for_client_cert_finger_print_alias:
        To: XForwardedForClientCertFingerprintAlias
      x_forwarded_for_client_cert_finger_print_enabled:
        To: XForwardedForClientCertFingerprintEnabled
      x_forwarded_for_client_cert_issuer_dn_alias:
        To: XForwardedForClientCertIssuerDNAlias
      x_forwarded_for_client_cert_issuer_dn_enabled:
        To: XForwardedForClientCertIssuerDNEnabled
      x_forwarded_for_client_cert_subject_dn_alias:
        To: XForwardedForClientCertSubjectDNAlias
      x_forwarded_for_client_cert_subject_dn_enabled:
        To: XForwardedForClientCertSubjectDNEnabled
      x_forwarded_for_client_source_ips_enabled:
        To: XForwardedForClientSourceIpsEnabled
      x_forwarded_for_client_source_ips_trusted:
        To: XForwardedForClientSourceIpsTrusted
      x_forwarded_for_client_src_port_enabled:
        To: XForwardedForClientSrcPortEnabled
      x_forwarded_for_enabled:
        To: XForwardedForEnabled
      x_forwarded_for_host_enabled:
        To: XForwardedForHostEnabled
      x_forwarded_for_processing_mode:
        To: XForwardedForProcessingMode
      x_forwarded_for_proto_enabled:
        To: XForwardedForProtoEnabled
      x_forwarded_for_slb_id_enabled:
        To: XForwardedForSLBIdEnabled
      x_forwarded_for_slb_port_enabled:
        To: XForwardedForSLBPortEnabled
  xforwarded_for_config:
    Ignore: true
Attributes:
  id:
    To: ListenerId
  access_log_record_customized_headers_enabled:
    Ignore: true
  access_log_tracing_config:
    Ignore: true
  acl_config:
    Ignore: true
  certificates:
    Ignore: true
  default_actions:
    Ignore: true
  gzip_enabled:
    Ignore: true
  http2_enabled:
    Ignore: true
  idle_timeout:
    Ignore: true
  listener_description:
    Ignore: true
  listener_port:
    Ignore: true
  listener_protocol:
    Ignore: true
  load_balancer_id:
    Ignore: true
  quic_config:
    Ignore: true
  request_timeout:
    Ignore: true
  security_policy_id:
    Ignore: true
  status:
    Ignore: true
  tags:
    Ignore: true
  x_forwarded_for_config:
    Ignore: true
  xforwarded_for_config:
    Ignore: true
