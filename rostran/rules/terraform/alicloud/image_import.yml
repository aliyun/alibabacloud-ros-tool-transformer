Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_image_import
  To: ALIYUN::ECS::CustomImage
Properties:
  architecture:
    To: Architecture
  boot_mode:
    To: BootMode
  description:
    To: Description
  disk_device_mapping:
    To: DiskDeviceMapping
    Type: List
    Schema:
      device:
        To: Device
      disk_image_size:
        Ignore: true
      format:
        Ignore: true
      oss_bucket:
        Ignore: true
      oss_object:
        Ignore: true
  image_name:
    To: ImageName
  license_type:
    Ignore: true
  os_type:
    Ignore: true
  platform:
    To: Platform
Attributes:
  id:
    To: ImageId
