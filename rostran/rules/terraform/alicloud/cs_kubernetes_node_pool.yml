Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_cs_kubernetes_node_pool
  To: ALIYUN::CS::ClusterNodePool
Properties:
  auto_mode:
    To: NodePoolInfo
    Type: Map
    Schema:
      enabled:
        Ignore: true
  auto_renew:
    To: ScalingGroup.AutoRenew
  auto_renew_period:
    To: ScalingGroup.AutoRenewPeriod
  auto_upgrade_kubelet:
    Ignore: true
  cis_enabled:
    Ignore: true
  cluster_id:
    To: ClusterId
  compensate_with_on_demand:
    To: ScalingGroup.CompensateWithOnDemand
  cpu_policy:
    To: KubernetesConfig.CpuPolicy
  data_disks:
    To: ScalingGroup.DataDisks
    Type: List
    Schema:
      auto_format:
        Ignore: true
      auto_snapshot_policy_id:
        To: AutoSnapshotPolicyId
      bursting_enabled:
        Ignore: true
      category:
        To: Category
      device:
        Ignore: true
      encrypted:
        To: Encrypted
      file_system:
        Ignore: true
      kms_key_id:
        Ignore: true
      mount_target:
        Ignore: true
      name:
        Ignore: true
      performance_level:
        To: PerformanceLevel
      provisioned_iops:
        Ignore: true
      size:
        To: Size
      snapshot_id:
        Ignore: true
  deployment_set_id:
    To: ScalingGroup.DeploymentSetId
  desired_size:
    To: Count
  eflo_node_group:
    To: NodePoolInfo
    Type: Map
    Schema:
      cluster_id:
        Ignore: true
      group_id:
        Ignore: true
  endpoint:
    Ignore: true
  force_delete:
    Ignore: true
  format_disk:
    To: ScalingGroup.FormatDisk
  image_id:
    To: ScalingGroup.ImageId
  image_type:
    To: ScalingGroup.ImageType
  install_cloud_monitor:
    To: KubernetesConfig.CmsEnabled
  instance_charge_type:
    To: ScalingGroup.InstanceChargeType
  instance_metadata_options:
    To: ScalingGroup
    Type: Map
    Schema:
      http_tokens:
        Ignore: true
  instance_patterns:
    To: ScalingGroup.InstancePatterns
    Type: List
    Schema:
      cores:
        To: Cores
      cpu_architectures:
        To: CpuArchitectures
      excluded_instance_types:
        To: ExcludedInstanceTypes
      instance_categories:
        To: InstanceCategories
      instance_family_level:
        To: InstanceFamilyLevel
      instance_type_families:
        To: InstanceTypeFamilies
      max_cpu_cores:
        To: MaxCpuCores
      max_memory_size:
        To: MaxMemorySize
      memory:
        To: Memory
      min_cpu_cores:
        To: MinCpuCores
      min_memory_size:
        To: MinMemorySize
  instance_types:
    To: ScalingGroup.InstanceTypes
  instances:
    Ignore: true
  internet_charge_type:
    To: ScalingGroup.InternetChargeType
  internet_max_bandwidth_out:
    To: ScalingGroup.InternetMaxBandwidthOut
  keep_instance_name:
    Ignore: true
  key_name:
    To: ScalingGroup.KeyPair
  kms_encrypted_password:
    To: ScalingGroup.LoginPassword
  kms_encryption_context:
    To: ScalingGroup.KmsEncryptionContext
  kubelet_configuration:
    To: KubernetesConfig
    Type: Map
    Schema:
      allowed_unsafe_sysctls:
        Ignore: true
      cluster_dns:
        Ignore: true
      container_log_max_files:
        Ignore: true
      container_log_max_size:
        Ignore: true
      container_log_max_workers:
        Ignore: true
      container_log_monitor_interval:
        Ignore: true
      cpu_cfs_quota:
        Ignore: true
      cpu_cfs_quota_period:
        Ignore: true
      cpu_manager_policy:
        Ignore: true
      event_burst:
        Ignore: true
      event_record_qps:
        Ignore: true
      eviction_hard:
        Ignore: true
      eviction_soft:
        Ignore: true
      eviction_soft_grace_period:
        Ignore: true
      feature_gates:
        Ignore: true
      image_gc_high_threshold_percent:
        Ignore: true
      image_gc_low_threshold_percent:
        Ignore: true
      kube_api_burst:
        Ignore: true
      kube_api_qps:
        Ignore: true
      kube_reserved:
        Ignore: true
      max_pods:
        Ignore: true
      memory_manager_policy:
        Ignore: true
      pod_pids_limit:
        Ignore: true
      read_only_port:
        Ignore: true
      registry_burst:
        Ignore: true
      registry_pull_qps:
        Ignore: true
      reserved_memory:
        Ignore: true
      serialize_image_pulls:
        Ignore: true
      server_tls_bootstrap:
        Ignore: true
      system_reserved:
        Ignore: true
      topology_manager_policy:
        Ignore: true
      tracing:
        Ignore: true
  labels:
    To: KubernetesConfig.Labels
    Type: List
    Schema:
      key:
        To: Key
      value:
        To: Value
  limits:
    Ignore: true
  login_as_non_root:
    To: ScalingGroup.LoginAsNonRoot
  management:
    To: Management
    Type: Map
    Schema:
      auto_repair:
        To: AutoRepair
      auto_repair_policy:
        Ignore: true
      auto_upgrade:
        Ignore: true
      auto_upgrade_policy:
        Ignore: true
      auto_vul_fix:
        Ignore: true
      auto_vul_fix_policy:
        Ignore: true
      enable:
        To: Enable
      max_unavailable:
        Ignore: true
      surge:
        Ignore: true
      surge_percentage:
        Ignore: true
  multi_az_policy:
    To: ScalingGroup.MultiAzPolicy
  name:
    To: NodePoolInfo.Name
  node_name_mode:
    To: KubernetesConfig.NodeNameMode
  node_pool_name:
    To: NodePoolInfo.Name
  numa_node:
    Ignore: true
  on_demand_base_capacity:
    To: ScalingGroup.OnDemandBaseCapacity
  on_demand_percentage_above_base_capacity:
    To: ScalingGroup.OnDemandPercentageAboveBaseCapacity
  password:
    To: ScalingGroup.LoginPassword
  period:
    To: ScalingGroup.Period
  period_unit:
    To: ScalingGroup.PeriodUnit
  platform:
    To: ScalingGroup.Platform
  pre_user_data:
    To: ScalingGroup.PreUserData
  private_pool_options:
    To: ScalingGroup
    Type: Map
    Schema:
      private_pool_options_id:
        Ignore: true
      private_pool_options_match_criteria:
        Ignore: true
  ram_role_name:
    To: ScalingGroup.RamRoleName
  rds_instances:
    To: ScalingGroup.RdsInstances
  resource_group_id:
    To: NodePoolInfo.ResourceGroupId
  restart_node:
    Ignore: true
  rolling_policy:
    To: NodePoolInfo
    Type: Map
    Schema:
      batch_interval:
        Ignore: true
      max_parallelism:
        Ignore: true
      node_names:
        Ignore: true
      pause_policy:
        Ignore: true
  rollout_policy:
    To: NodePoolInfo
    Type: Map
    Schema:
      max_unavailable:
        Ignore: true
  runtime_name:
    To: KubernetesConfig.Runtime
  runtime_version:
    To: KubernetesConfig.RuntimeVersion
  sampling_rate_per_million:
    Ignore: true
  scaling_config:
    To: AutoScaling
    Type: Map
    Schema:
      eip_bandwidth:
        To: EipBandwidth
      eip_internet_charge_type:
        To: EipInternetChargeType
      enable:
        To: Enable
      is_bond_eip:
        To: IsBondEip
      max_size:
        To: MaxInstances
      min_size:
        To: MinInstances
      type:
        To: Type
  scaling_policy:
    To: ScalingGroup.ScalingPolicy
  security_group_id:
    To: ScalingGroup.SecurityGroupId
  security_group_ids:
    To: ScalingGroup.SecurityGroupIds
  security_hardening_os:
    To: ScalingGroup.SecurityHardeningOs
  soc_enabled:
    To: ScalingGroup.SocEnabled
  spot_instance_pools:
    To: ScalingGroup.SpotInstancePools
  spot_instance_remedy:
    To: ScalingGroup.SpotInstanceRemedy
  spot_price_limit:
    To: ScalingGroup.SpotPriceLimit
    Type: List
    Schema:
      instance_type:
        To: InstanceType
      price_limit:
        To: PriceLimit
  spot_strategy:
    To: ScalingGroup.SpotStrategy
  system_disk_bursting_enabled:
    To: ScalingGroup.SystemDiskBurstingEnabled
  system_disk_categories:
    To: ScalingGroup.SystemDiskCategories
  system_disk_category:
    To: ScalingGroup.SystemDiskCategory
  system_disk_encrypt_algorithm:
    To: ScalingGroup.SystemDiskEncryptAlgorithm
  system_disk_encrypted:
    To: ScalingGroup.SystemDiskEncrypted
  system_disk_kms_key:
    To: ScalingGroup.SystemDiskKmsKey
  system_disk_performance_level:
    To: ScalingGroup.SystemDiskPerformanceLevel
  system_disk_provisioned_iops:
    To: ScalingGroup.SystemDiskProvisionedIops
  system_disk_size:
    To: ScalingGroup.SystemDiskSize
  system_disk_snapshot_policy_id:
    To: ScalingGroup.SystemDiskSnapshotPolicyId
  tags:
    To: ScalingGroup.Tags
    Handler: tags_dict_to_list
  taints:
    To: KubernetesConfig.Taints
    Type: List
    Schema:
      effect:
        To: Effect
      key:
        To: Key
      value:
        To: Value
  tee_config:
    To: TeeConfig
    Type: Map
    Schema:
      tee_enable:
        To: TeeEnable
  type:
    To: NodePoolInfo.Type
  unschedulable:
    To: KubernetesConfig.Unschedulable
  update_nodes:
    Ignore: true
  upgrade_policy:
    To: NodePoolInfo
    Type: Map
    Schema:
      image_id:
        Ignore: true
      kubernetes_version:
        Ignore: true
      runtime:
        Ignore: true
      runtime_version:
        Ignore: true
      use_replace:
        Ignore: true
  user_data:
    To: KubernetesConfig.UserData
  vswitch_ids:
    To: ScalingGroup.VSwitchIds
  vul_level:
    Ignore: true
Attributes:
  id:
    To: NodePoolId
  node_pool_id:
    To: NodePoolId
  scaling_group_id:
    Ignore: true
