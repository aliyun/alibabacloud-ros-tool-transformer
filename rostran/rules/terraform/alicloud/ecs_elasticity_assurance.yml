Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_ecs_elasticity_assurance
  To: ALIYUN::ECS::ElasticityAssurance
Properties:
  assurance_times:
    Ignore: true
  auto_renew:
    To: AutoRenew
  auto_renew_period:
    To: AutoRenewPeriod
  auto_renew_period_unit:
    Ignore: true
  description:
    To: Description
  instance_amount:
    To: InstanceAmount
  instance_type:
    To: InstanceTypes
    Type: List
  period:
    To: Period
  period_unit:
    To: PeriodUnit
  private_pool_options_match_criteria:
    To: PrivatePoolOptions.MatchCriteria
  private_pool_options_name:
    To: PrivatePoolOptions.Name
  resource_group_id:
    To: ResourceGroupId
  start_time:
    To: StartTime
  tags:
    To: Tags
    Handler: tags_dict_to_list
  zone_ids:
    To: ZoneId
Attributes:
  id:
    To: PrivatePoolOptionsId
  description:
    Ignore: true
  elasticity_assurance_id:
    To: PrivatePoolOptionsId
  end_time:
    Ignore: true
  instance_charge_type:
    Ignore: true
  region_id:
    Ignore: true
  start_time_type:
    Ignore: true
  status:
    Ignore: true
  used_assurance_times:
    Ignore: true
