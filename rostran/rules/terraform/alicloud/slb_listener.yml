Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_slb_listener
  To: ALIYUN::SLB::Listener
Properties:
  acl_id:
    To: AclId
  acl_ids:
    To: AclIds
    Type: List
  acl_status:
    To: AclStatus
  acl_type:
    To: AclType
  backend_port:
    To: BackendServerPort
  bandwidth:
    To: Bandwidth
  ca_certificate_id:
    To: CACertificateId
  cookie:
    To: Persistence
    Type: Map
  cookie_timeout:
    To: Persistence
    Type: Map
  delete_protection_validation:
    Ignore: true
  description:
    To: Description
  enable_http2:
    To: EnableHttp2
  established_timeout:
    Ignore: true
  forward_port:
    Ignore: true
  frontend_port:
    To: ListenerPort
  gzip:
    To: Gzip
  health_check:
    To: HealthCheck
    Type: Map
  health_check_connect_port:
    Ignore: true
  health_check_domain:
    Ignore: true
  health_check_http_code:
    Ignore: true
  health_check_interval:
    Ignore: true
  health_check_method:
    Ignore: true
  health_check_timeout:
    Ignore: true
  health_check_type:
    Ignore: true
  health_check_uri:
    Ignore: true
  healthy_threshold:
    Ignore: true
  idle_timeout:
    To: IdleTimeout
  listener_forward:
    Ignore: true
  load_balancer_id:
    To: LoadBalancerId
  master_slave_server_group_id:
    To: MasterSlaveServerGroupId
  persistence_timeout:
    To: Persistence
    Type: Map
  protocol:
    To: Protocol
  proxy_protocol_v2_enabled:
    To: ProxyProtocolV2Enabled
  request_timeout:
    To: RequestTimeout
  scheduler:
    To: Scheduler
  server_certificate_id:
    To: ServerCertificateId
  server_group_id:
    To: VServerGroupId
  ssl_certificate_id:
    Ignore: true
  sticky_session:
    To: Persistence
    Type: Map
  sticky_session_type:
    To: Persistence
    Type: Map
  tls_cipher_policy:
    To: TLSCipherPolicy
  unhealthy_threshold:
    Ignore: true
  x_forwarded_for:
    Ignore: true
Attributes:
  id:
    Ignore: true
  x_forwarded_for:
    Ignore: true
