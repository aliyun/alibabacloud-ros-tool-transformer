Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_compute_nest_service_instance
  To: ALIYUN::ComputeNest::ServiceInstance
Properties:
  commodity:
    To: Commodity
    Type: Map
    Schema:
      pay_period:
        To: PayPeriod
      pay_period_unit:
        To: PayPeriodUnit
  enable_instance_ops:
    To: EnableInstanceOps
  enable_user_prometheus:
    To: EnableUserPrometheus
  operation_metadata:
    Ignore: true
  parameters:
    To: Parameters
  payment_type:
    Ignore: true
  resource_group_id:
    To: ResourceGroupId
  service_id:
    To: Service.ServiceId
  service_instance_name:
    To: ServiceInstanceName
  service_version:
    To: Service.Version
  specification_name:
    To: SpecificationCode
  tags:
    To: Tags
    Handler: tags_dict_to_list
  template_name:
    To: TemplateName
Attributes:
  id:
    To: ServiceInstanceId
  status:
    To: StatusDetail
