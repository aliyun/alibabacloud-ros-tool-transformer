Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_vpn_connection
  To: ALIYUN::VPC::VpnConnection
Properties:
  auto_config_route:
    To: AutoConfigRoute
  bgp_config:
    To: BgpConfig
    Type: Map
    Schema:
      enable:
        To: EnableBgp
      local_asn:
        To: LocalAsn
      local_bgp_ip:
        To: LocalBgpIp
      tunnel_cidr:
        To: TunnelCidr
  customer_gateway_id:
    To: CustomerGatewayId
  effect_immediately:
    To: EffectImmediately
  enable_dpd:
    To: EnableDpd
  enable_nat_traversal:
    To: EnableNatTraversal
  enable_tunnels_bgp:
    To: EnableTunnelsBgp
  health_check_config:
    To: HealthCheckConfig
    Type: Map
    Schema:
      dip:
        To: Dip
      enable:
        To: Enable
      interval:
        To: Interval
      retry:
        To: Retry
      sip:
        To: Sip
  ike_auth_alg:
    To: IkeConfig.IkeAuthAlg
  ike_config:
    To: IkeConfig
    Type: Map
    Schema:
      ike_auth_alg:
        To: IkeAuthAlg
      ike_enc_alg:
        To: IkeEncAlg
      ike_lifetime:
        To: IkeLifetime
      ike_local_id:
        To: LocalId
      ike_mode:
        To: IkeMode
      ike_pfs:
        To: IkePfs
      ike_remote_id:
        To: RemoteId
      ike_version:
        To: IkeVersion
      psk:
        To: Psk
  ike_enc_alg:
    To: IkeConfig.IkeEncAlg
  ike_lifetime:
    To: IkeConfig.IkeLifetime
  ike_mode:
    To: IkeConfig.IkeMode
  ike_pfs:
    To: IkeConfig.IkePfs
  ike_version:
    To: IkeConfig.IkeVersion
  ipsec_auth_alg:
    To: IpsecConfig.IpsecAuthAlg
  ipsec_config:
    To: IpsecConfig
    Type: Map
    Schema:
      ipsec_auth_alg:
        To: IpsecAuthAlg
      ipsec_enc_alg:
        To: IpsecEncAlg
      ipsec_lifetime:
        To: IpsecLifetime
      ipsec_pfs:
        To: IpsecPfs
  ipsec_enc_alg:
    To: IpsecConfig.IpsecEncAlg
  ipsec_lifetime:
    To: IpsecConfig.IpsecLifetime
  ipsec_pfs:
    To: IpsecConfig.IpsecPfs
  local_asn:
    To: BgpConfig.LocalAsn
  local_bgp_ip:
    To: BgpConfig.LocalBgpIp
  local_id:
    To: IkeConfig.LocalId
  local_subnet:
    To: LocalSubnet
  name:
    To: Name
  network_type:
    Ignore: true
  psk:
    To: IkeConfig.Psk
  remote_id:
    To: IkeConfig.RemoteId
  remote_subnet:
    To: RemoteSubnet
  tags:
    Ignore: true
  tunnel_cidr:
    To: BgpConfig.TunnelCidr
  tunnel_options_specification:
    To: TunnelOptionsSpecification
    Type: List
    Schema:
      customer_gateway_id:
        To: CustomerGatewayId
      enable_dpd:
        To: EnableDpd
      enable_nat_traversal:
        To: EnableNatTraversal
      internet_ip:
        Ignore: true
      role:
        To: Role
      state:
        Ignore: true
      status:
        Ignore: true
      tunnel_bgp_config:
        To: TunnelBgpConfig
        Type: Map
        Schema:
          local_asn:
            To: LocalAsn
          local_bgp_ip:
            To: LocalBgpIp
          tunnel_cidr:
            To: TunnelCidr
      tunnel_id:
        Ignore: true
      tunnel_ike_config:
        To: TunnelIkeConfig
        Type: Map
        Schema:
          ike_auth_alg:
            To: IkeAuthAlg
          ike_enc_alg:
            To: IkeEncAlg
          ike_lifetime:
            To: IkeLifetime
          ike_mode:
            To: IkeMode
          ike_pfs:
            To: IkePfs
          ike_version:
            To: IkeVersion
          local_id:
            To: LocalId
          psk:
            To: Psk
          remote_id:
            To: RemoteId
      tunnel_ipsec_config:
        To: TunnelIpsecConfig
        Type: Map
        Schema:
          ipsec_auth_alg:
            To: IpsecAuthAlg
          ipsec_enc_alg:
            To: IpsecEncAlg
          ipsec_lifetime:
            To: IpsecLifetime
          ipsec_pfs:
            To: IpsecPfs
      zone_no:
        Ignore: true
  vpn_connection_name:
    Ignore: true
  vpn_gateway_id:
    To: VpnGatewayId
Attributes:
  id:
    To: VpnConnectionId
  bgp_config:
    Ignore: true
  create_time:
    Ignore: true
  resource_group_id:
    Ignore: true
  status:
    To: Status
  tunnel_options_specification:
    Ignore: true
