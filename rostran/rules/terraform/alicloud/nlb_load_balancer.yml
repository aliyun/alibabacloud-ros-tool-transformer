Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_nlb_load_balancer
  To: ALIYUN::NLB::LoadBalancer
Properties:
  address_ip_version:
    To: AddressIpVersion
  address_type:
    To: AddressType
  bandwidth_package_id:
    To: BandwidthPackageId
  cps:
    Ignore: true
  cross_zone_enabled:
    To: CrossZoneEnabled
  deletion_protection_config:
    To: DeletionProtectionConfig
    Type: Map
    Schema:
      enabled:
        To: Enabled
      reason:
        To: Reason
  deletion_protection_enabled:
    To: DeletionProtectionConfig.Enabled
  deletion_protection_reason:
    To: DeletionProtectionConfig.Reason
  ipv6_address_type:
    Ignore: true
  load_balancer_name:
    To: LoadBalancerName
  load_balancer_type:
    To: LoadBalancerType
  modification_protection_config:
    To: ModificationProtectionConfig
    Type: Map
    Schema:
      reason:
        To: Reason
      status:
        To: Status
  modification_protection_reason:
    To: ModificationProtectionConfig.Reason
  modification_protection_status:
    To: ModificationProtectionConfig.Status
  payment_type:
    To: LoadBalancerBillingConfig.PayType
  resource_group_id:
    To: ResourceGroupId
  security_group_ids:
    Ignore: true
  tags:
    To: Tags
    Handler: tags_dict_to_list
  vpc_id:
    To: VpcId
  zone_mappings:
    To: ZoneMappings
    Type: List
    Schema:
      allocation_id:
        To: AllocationId
      eni_id:
        Ignore: true
      ipv6_address:
        Ignore: true
      private_ipv4_address:
        To: PrivateIPv4Address
      public_ipv4_address:
        Ignore: true
      status:
        Ignore: true
      vswitch_id:
        To: VSwitchId
      zone_id:
        To: ZoneId
Attributes:
  id:
    To: LoadBalancerId
  create_time:
    Ignore: true
  deletion_protection_config:
    Ignore: true
  dns_name:
    To: DNSName
  load_balancer_business_status:
    Ignore: true
  modification_protection_config:
    Ignore: true
  region_id:
    Ignore: true
  status:
    Ignore: true
  zone_mappings:
    To: ZoneMappings
