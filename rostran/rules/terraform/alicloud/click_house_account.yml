Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_click_house_account
  To: ALIYUN::ClickHouse::EnterpriseDBClusterAccount
Properties:
  account_description:
    To: Description
  account_name:
    To: Account
  account_password:
    To: Password
  allow_databases:
    To: DmlAuthSetting.AllowDatabases
    Type: List
  allow_dictionaries:
    To: DmlAuthSetting.AllowDictionaries
    Type: List
  db_cluster_id:
    To: DBInstanceId
  ddl_authority:
    To: DmlAuthSetting.DdlAuthority
  dml_authority:
    To: DmlAuthSetting.DmlAuthority
  total_databases:
    Ignore: true
  total_dictionaries:
    Ignore: true
  type:
    To: AccountType
Attributes:
  id:
    Ignore: true
  status:
    Ignore: true
