Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_cms_metric_rule_template
  To: ALIYUN::CMS::MetricRuleTemplate
Properties:
  alert_templates:
    To: AlertTemplates
    Type: List
    Schema:
      category:
        To: Category
      escalations:
        To: Escalations
        Type: Map
        Schema:
          critical:
            To: Critical
            Type: Map
            Schema:
              comparison_operator:
                To: ComparisonOperator
              statistics:
                To: Statistics
              threshold:
                To: Threshold
              times:
                To: Times
          info:
            To: Info
            Type: Map
            Schema:
              comparison_operator:
                To: ComparisonOperator
              statistics:
                To: Statistics
              threshold:
                To: Threshold
              times:
                To: Times
          warn:
            To: Warn
            Type: Map
            Schema:
              comparison_operator:
                To: ComparisonOperator
              statistics:
                To: Statistics
              threshold:
                To: Threshold
              times:
                To: Times
      metric_name:
        To: MetricName
      namespace:
        To: Namespace
      rule_name:
        To: RuleName
      webhook:
        To: Webhook
  apply_mode:
    Ignore: true
  critical:
    Ignore: true
  description:
    To: Description
  enable_end_time:
    Ignore: true
  enable_start_time:
    Ignore: true
  group_id:
    Ignore: true
  info:
    Ignore: true
  metric_rule_template_name:
    To: Name
  notify_level:
    Ignore: true
  silence_time:
    Ignore: true
  warn:
    Ignore: true
  webhook:
    Ignore: true
Attributes:
  id:
    To: Id
  rest_version:
    Ignore: true
