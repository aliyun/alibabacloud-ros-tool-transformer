Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_nlb_server_group
  To: ALIYUN::NLB::ServerGroup
Properties:
  address_ip_version:
    To: AddressIPVersion
  any_port_enabled:
    To: AnyPortEnabled
  connection_drain:
    Ignore: true
  connection_drain_enabled:
    To: ConnectionDrainEnabled
  connection_drain_timeout:
    To: ConnectionDrainTimeout
  health_check:
    To: HealthCheckConfig
    Type: Map
    Schema:
      health_check_connect_port:
        To: HealthCheckConnectPort
      health_check_connect_timeout:
        To: HealthCheckConnectTimeout
      health_check_domain:
        To: HealthCheckDomain
      health_check_enabled:
        To: HealthCheckEnabled
      health_check_exp:
        Ignore: true
      health_check_http_code:
        To: HealthCheckHttpCode
        Type: List
      health_check_interval:
        To: HealthCheckInterval
      health_check_req:
        Ignore: true
      health_check_type:
        To: HealthCheckType
      health_check_url:
        To: HealthCheckUrl
      healthy_threshold:
        To: HealthyThreshold
      http_check_method:
        To: HttpCheckMethod
      unhealthy_threshold:
        To: UnhealthyThreshold
  preserve_client_ip_enabled:
    To: PreserveClientIpEnabled
  protocol:
    To: Protocol
  resource_group_id:
    To: ResourceGroupId
  scheduler:
    To: Scheduler
  server_group_name:
    To: ServerGroupName
  server_group_type:
    To: ServerGroupType
  status:
    Ignore: true
  tags:
    To: Tags
    Handler: tags_dict_to_list
  vpc_id:
    To: VpcId
Attributes:
  id:
    To: ServerGroupId
  address_ip_version:
    Ignore: true
  any_port_enabled:
    Ignore: true
  connection_drain:
    Ignore: true
  connection_drain_enabled:
    Ignore: true
  connection_drain_timeout:
    Ignore: true
  health_check:
    Ignore: true
  preserve_client_ip_enabled:
    Ignore: true
  protocol:
    Ignore: true
  region_id:
    Ignore: true
  resource_group_id:
    Ignore: true
  scheduler:
    Ignore: true
  server_group_name:
    Ignore: true
  server_group_type:
    Ignore: true
  status:
    Ignore: true
  tags:
    Ignore: true
  vpc_id:
    Ignore: true
