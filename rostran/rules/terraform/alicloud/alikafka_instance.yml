Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_alikafka_instance
  To: ALIYUN::KAFKA::Instance
Properties:
  config:
    To: DeployOption.Config
  confluent_config:
    Ignore: true
  default_topic_partition_num:
    Ignore: true
  deploy_type:
    To: DeployType
  disk_size:
    To: DiskSize
  disk_type:
    To: DiskType
  eip_max:
    To: EipMax
  enable_auto_group:
    Ignore: true
  enable_auto_topic:
    Ignore: true
  instance_type:
    Ignore: true
  io_max:
    To: IoMax
  io_max_spec:
    To: IoMaxSpec
  kms_key_id:
    To: DeployOption.KMSKeyId
  name:
    To: DeployOption.Name
  paid_type:
    To: PayType
  partition_num:
    To: PartitionNum
  password:
    To: DeployOption.Password
  resource_group_id:
    Ignore: true
  security_group:
    To: DeployOption.SecurityGroup
  selected_zones:
    To: DeployOption.SelectedZones
  serverless_config:
    To: ServerlessConfig
    Type: Map
    Schema:
      reserved_publish_capacity:
        To: ReservedPublishCapacity
      reserved_subscribe_capacity:
        To: ReservedSubscribeCapacity
  service_version:
    To: DeployOption.ServiceVersion
  spec_type:
    To: SpecType
  tags:
    To: Tags
    Handler: tags_dict_to_list
  topic_quota:
    To: TopicQuota
  vpc_id:
    To: DeployOption.VpcId
  vswitch_id:
    To: DeployOption.VSwitchId
  vswitch_ids:
    To: DeployOption.VSwitchIds
  zone_id:
    To: DeployOption.ZoneId
Attributes:
  id:
    To: InstanceId
  domain_endpoint:
    To: DomainEndpoint
  end_point:
    To: Endpoint
  group_left:
    Ignore: true
  group_used:
    Ignore: true
  is_partition_buy:
    Ignore: true
  partition_left:
    Ignore: true
  partition_used:
    Ignore: true
  sasl_domain_endpoint:
    To: SaslDomainEndpoint
  ssl_domain_endpoint:
    To: SslDomainEndpoint
  ssl_endpoint:
    To: SslEndpoint
  status:
    Ignore: true
  topic_left:
    Ignore: true
  topic_num_of_buy:
    Ignore: true
  topic_used:
    Ignore: true
