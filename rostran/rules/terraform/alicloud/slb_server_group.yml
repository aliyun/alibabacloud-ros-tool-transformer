Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_slb_server_group
  To: ALIYUN::SLB::VServerGroup
Properties:
  delete_protection_validation:
    Ignore: true
  load_balancer_id:
    To: LoadBalancerId
  name:
    To: VServerGroupName
  servers:
    To: BackendServers
    Type: List
    Schema:
      port:
        To: Port
      server_ids:
        Ignore: true
      type:
        To: Type
      weight:
        To: Weight
  tags:
    To: Tags
    Type: List
Attributes:
  id:
    To: VServerGroupId
