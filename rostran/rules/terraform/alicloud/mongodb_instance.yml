Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_mongodb_instance
  To: ALIYUN::MONGODB::Instance
Properties:
  account_password:
    To: AccountPassword
  auto_renew:
    To: AutoRenew
  auto_renew_duration:
    Ignore: true
  backup_interval:
    To: BackupPolicyOptions.BackupInterval
  backup_period:
    To: BackupPolicyOptions.PreferredBackupPeriod
  backup_retention_period:
    To: BackupPolicyOptions.BackupRetentionPeriod
  backup_retention_policy_on_cluster_deletion:
    To: BackupPolicyOptions.BackupRetentionPolicyOnClusterDeletion
  backup_time:
    To: BackupPolicyOptions.PreferredBackupTime
  cloud_disk_encryption_key:
    Ignore: true
  db_instance_class:
    To: DBInstanceClass
  db_instance_release_protection:
    To: DBInstanceReleaseProtection
  db_instance_storage:
    To: DBInstanceStorage
  effective_time:
    Ignore: true
  enable_backup_log:
    To: BackupPolicyOptions.EnableBackupLog
  encrypted:
    To: Encrypted
  encryption_key:
    To: EncryptionKey
  encryptor_name:
    Ignore: true
  engine_version:
    To: EngineVersion
  force_encryption:
    To: SSLOptions.ForceEncryption
  global_security_group_list:
    Ignore: true
  hidden_zone_id:
    To: HiddenZoneId
  instance_charge_type:
    To: ChargeType
  kms_encrypted_password:
    Ignore: true
  kms_encryption_context:
    Ignore: true
  log_backup_retention_period:
    To: BackupPolicyOptions.LogBackupRetentionPeriod
  maintain_end_time:
    Ignore: true
  maintain_start_time:
    Ignore: true
  name:
    To: DBInstanceDescription
  network_type:
    Ignore: true
  order_type:
    Ignore: true
  parameters:
    Ignore: true
  period:
    To: Period
  provisioned_iops:
    To: ProvisionedIops
  readonly_replicas:
    To: ReadonlyReplicas
  replication_factor:
    To: ReplicationFactor
  resource_group_id:
    To: ResourceGroupId
  restore_time:
    To: RestoreTime
  role_arn:
    Ignore: true
  secondary_zone_id:
    To: SecondaryZoneId
  security_group_id:
    To: SecurityGroupId
  security_ip_list:
    To: SecurityIPArray
  snapshot_backup_type:
    To: BackupPolicyOptions.SnapshotBackupType
  src_db_instance_id:
    To: SrcDBInstanceId
  ssl_action:
    To: SSLOptions.SSLAction
  storage_type:
    To: StorageType
  tags:
    To: Tags
    Handler: tags_dict_to_list
  tde_status:
    To: TDEStatus
  vpc_id:
    To: VpcId
  vswitch_id:
    To: VSwitchId
  zone_id:
    To: ZoneId
Attributes:
  id:
    To: DBInstanceId
  key_ids:
    Ignore: true
  replica_set_name:
    To: ReplicaSetName
  replica_sets:
    Ignore: true
  retention_period:
    Ignore: true
  ssl_status:
    Ignore: true
  zone_infos:
    Ignore: true
