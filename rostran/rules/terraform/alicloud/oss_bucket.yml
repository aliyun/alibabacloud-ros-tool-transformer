Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_oss_bucket
  To: ALIYUN::OSS::Bucket
Properties:
  access_monitor:
    Ignore: true
  acl:
    To: AccessControl
  bucket:
    To: BucketName
  cors_rule:
    To: CORSRule
    Type: List
    Schema:
      allowed_headers:
        To: AllowedHeader
      allowed_methods:
        To: AllowedMethod
      allowed_origins:
        To: AllowedOrigin
      expose_headers:
        To: ExposeHeader
      max_age_seconds:
        To: MaxAgeSeconds
  created_before_date:
    Ignore: true
  date:
    Ignore: true
  days:
    Ignore: true
  expired_object_delete_marker:
    Ignore: true
  force_destroy:
    To: DeletionForce
  is_access_time:
    Ignore: true
  lifecycle_rule:
    To: LifecycleConfiguration.Rule
    Type: List
    Schema:
      abort_multipart_upload:
        To: AbortMultipartUpload
        Type: Map
        Schema:
          created_before_date:
            To: CreatedBeforeDate
          days:
            To: Days
      enabled:
        To: Status
      expiration:
        To: Expiration
        Type: Map
        Schema:
          created_before_date:
            To: CreatedBeforeDate
          date:
            To: CreatedBeforeDate
          days:
            To: Days
          expired_object_delete_marker:
            To: ExpiredObjectDeleteMarker
      filter:
        To: Filter
        Type: Map
        Schema:
          not:
            To: Not
            Type: List
            Schema:
              prefix:
                To: Prefix
              tag:
                To: Tag
                Type: List
                Schema:
                  key:
                    To: Key
                  value:
                    To: Value
          object_size_greater_than:
            Ignore: true
          object_size_less_than:
            Ignore: true
      id:
        To: ID
      noncurrent_version_expiration:
        Ignore: true
      noncurrent_version_transition:
        Ignore: true
      prefix:
        To: Prefix
      tags:
        Ignore: true
      transitions:
        To: Transition
        Type: List
        Schema:
          created_before_date:
            To: CreatedBeforeDate
          date:
            To: CreatedBeforeDate
          days:
            To: Days
          is_access_time:
            To: IsAccessTime
          return_to_std_when_visit:
            To: ReturnToStdWhenVisit
          storage_class:
            To: StorageClass
  lifecycle_rule_allow_same_action_overlap:
    Ignore: true
  logging:
    To: LoggingConfiguration
    Type: Map
    Schema:
      target_bucket:
        To: TargetBucket
      target_prefix:
        To: TargetPrefix
  logging_isenable:
    Ignore: true
  object_size_greater_than:
    Ignore: true
  object_size_less_than:
    Ignore: true
  policy:
    To: Policy
  prefix:
    Ignore: true
  redundancy_type:
    To: RedundancyType
  referer_config:
    To: RefererConfiguration
    Type: Map
    Schema:
      allow_empty:
        To: AllowEmptyReferer
      referers:
        To: RefererList
  resource_group_id:
    To: ResourceGroupId
  return_to_std_when_visit:
    Ignore: true
  server_side_encryption_rule:
    To: ServerSideEncryptionConfiguration
    Type: Map
    Schema:
      kms_master_key_id:
        To: KMSMasterKeyID
      sse_algorithm:
        To: SSEAlgorithm
  storage_class:
    To: StorageClass
  tag:
    Ignore: true
  tags:
    To: Tags
    Handler: tags_dict_to_list
  transfer_acceleration:
    Ignore: true
  versioning:
    To: VersioningConfiguration
    Type: Map
    Schema:
      status:
        To: Status
  website:
    To: WebsiteConfigurationV2
    Type: Map
    Schema:
      error_document:
        To: ErrorDocument.Key
      index_document:
        To: IndexDocument.Suffix
Attributes:
  id:
    To: Name
  creation_date:
    Ignore: true
  extranet_endpoint:
    To: DomainName
  intranet_endpoint:
    To: InternalDomainName
  location:
    Ignore: true
  owner:
    Ignore: true
