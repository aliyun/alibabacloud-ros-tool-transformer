    Schema:
      comparison_operator:
        Ignore: true
      statistics:
        Ignore: true
      threshold:
        Ignore: true
      times:
        Ignore: true
  escalations_info:
    To: Escalations
    Type: Map
    Schema:
      comparison_operator:
        Ignore: true
      statistics:
        Ignore: true
      threshold:
        Ignore: true
      times:
        Ignore: true
  escalations_warn:
    To: Escalations
    Type: Map
    Schema:
      comparison_operator:
        Ignore: true
      statistics:
        Ignore: true
      threshold:
        Ignore: true
      times:
        Ignore: true
