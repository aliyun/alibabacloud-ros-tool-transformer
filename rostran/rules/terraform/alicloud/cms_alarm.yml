      annotations:
        To: Annotations
        Type: List
      level:
        To: Level
      prom_ql:
        To: PromQL
      times:
        To: Times
  silence_time:
    To: SilenceTime
  start_time:
    Ignore: true
  statistics:
    To: Escalations
    Type: Map
  tags:
    Ignore: true
  targets:
    Ignore: true
  threshold:
    To: Escalations
    Type: Map
  triggered_count:
    Ignore: true
