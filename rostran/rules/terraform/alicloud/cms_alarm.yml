      expression_list:
        To: ExpressionList
        Type: List
      expression_list_join:
        To: ExpressionListJoin
      expression_raw:
        To: ExpressionRaw
      level:
        To: Level
      times:
        To: Times
  contact_groups:
    To: ContactGroups
    Type: List
  dimensions:
    To: Resources
    Type: List
  effective_interval:
    To: EffectiveInterval
  enabled:
    Ignore: true
  end_time:
    Ignore: true
  escalations_critical:
    To: Escalations
