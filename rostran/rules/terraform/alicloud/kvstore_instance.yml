Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_kvstore_instance
  To: ALIYUN::REDIS::Instance
Properties:
  auto_renew:
    Ignore: true
  auto_renew_period:
    To: AutoRenewDuration
  availability_zone:
    To: ZoneId
  bandwidth:
    Ignore: true
  capacity:
    Ignore: true
  config:
    Ignore: true
  connection_string:
    Ignore: true
  connection_string_prefix:
    Ignore: true
  db_instance_name:
    To: InstanceName
  dry_run:
    Ignore: true
  effective_time:
    Ignore: true
  enable_public:
    Ignore: true
  instance_charge_type:
    Ignore: true
  instance_class:
    To: InstanceClass
  instance_name:
    To: InstanceName
  instance_type:
    To: InstanceClass
  is_auto_upgrade_open:
    Ignore: true
  kms_encrypted_password:
    Ignore: true
  kms_encryption_context:
    Ignore: true
  maintain_end_time:
    To: InstanceMaintainTime.MaintainEndTime
  maintain_start_time:
    To: InstanceMaintainTime.MaintainStartTime
  parameters:
    Ignore: true
  payment_type:
    To: ChargeType
  period:
    To: Period
  port:
    Ignore: true
  read_only_count:
    To: ReadOnlyCount
  resource_group_id:
    To: ResourceGroupId
  secondary_zone_id:
    To: SecondaryZoneId
  security_group_id:
    To: SecurityGroupId
  slave_read_only_count:
    Ignore: true
  tags:
    To: Tags
    Handler: tags_dict_to_list
  vswitch_id:
    To: VSwitchId
  zone_id:
    To: ZoneId
Attributes:
  id:
    To: InstanceId
  connection_domain:
    To: ConnectionDomain
  end_time:
    Ignore: true
  qps:
    To: QPS
  status:
    Ignore: true
