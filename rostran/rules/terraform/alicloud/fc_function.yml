Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_fc_function
  To: ALIYUN::FC::Function
Properties:
  ca_port:
    To: CAPort
  code_checksum:
    Ignore: true
  custom_container_config:
    To: CustomContainerConfig
    Type: Map
    Schema:
      args:
        To: Args
      command:
        To: Command
      image:
        To: Image
  description:
    To: Description
  environment_variables:
    To: EnvironmentVariables
  filename:
    To: Code
  handler:
    To: Handler
  initialization_timeout:
    To: InitializationTimeout
  initializer:
    To: Initializer
  instance_concurrency:
    To: InstanceConcurrency
  instance_type:
    To: InstanceType
  layers:
    Ignore: true
  memory_size:
    To: MemorySize
  name:
    To: FunctionName
  name_prefix:
    To: FunctionName
  oss_bucket:
    To: Code.OssBucketName
  oss_key:
    To: Code.OssObjectName
  runtime:
    To: Runtime
  service:
    To: ServiceName
  timeout:
    To: Timeout
Attributes:
  id:
    To:
    - ServiceName
    - FunctionName
  last_modified:
    Ignore: true
  function_id:
    To: FunctionId
  function_arn:
    To: ARN
