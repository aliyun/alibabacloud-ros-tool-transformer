Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_vpc_traffic_mirror_filter
  To: ALIYUN::VPC::TrafficMirrorFilter
Properties:
  action:
    Ignore: true
  destination_cidr_block:
    Ignore: true
  destination_port_range:
    Ignore: true
  dry_run:
    Ignore: true
  egress_rules:
    To: EgressRules
    Type: List
  ingress_rules:
    To: IngressRules
    Type: List
  priority:
    Ignore: true
  protocol:
    Ignore: true
  resource_group_id:
    Ignore: true
  source_cidr_block:
    Ignore: true
  source_port_range:
    Ignore: true
  tags:
    Ignore: true
  traffic_mirror_filter_description:
    To: TrafficMirrorFilterDescription
  traffic_mirror_filter_name:
    To: TrafficMirrorFilterName
Attributes:
  id:
    To: TrafficMirrorFilterId
  status:
    Ignore: true
