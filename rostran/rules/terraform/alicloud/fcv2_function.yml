Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_fcv2_function
  To: ALIYUN::FC::Function
Properties:
  ca_port:
    To: CAPort
  code:
    To: Code
    Type: Map
    Schema:
      oss_bucket_name:
        To: OssBucketName
      oss_object_name:
        To: OssObjectName
      zip_file:
        To: ZipFile
  code_checksum:
    Ignore: true
  cpu:
    To: Cpu
  create_time:
    Ignore: true
  custom_container_config:
    To: CustomContainerConfig
    Type: Map
    Schema:
      acceleration_type:
        To: AccelerationType
      args:
        To: Args
      command:
        To: Command
      image:
        To: Image
      web_server_mode:
        To: WebServerMode
  custom_dns:
    To: CustomDNS
    Type: Map
    Schema:
      dns_options:
        To: DnsOptions
        Type: List
      name_servers:
        To: NameServers
        Type: List
      searches:
        To: Searches
        Type: List
  custom_health_check_config:
    To: CustomHealthCheckConfig
    Type: Map
    Schema:
      failure_threshold:
        To: FailureThreshold
      http_get_url:
        To: HttpGetUrl
      initial_delay_seconds:
        To: InitialDelaySeconds
      period_seconds:
        To: PeriodSeconds
      success_threshold:
        To: SuccessThreshold
      timeout_seconds:
        To: TimeoutSeconds
  custom_runtime_config:
    To: CustomRuntimeConfig
    Type: Map
    Schema:
      args:
        To: Args
        Type: List
      command:
        To: Command
        Type: List
  description:
    To: Description
  disk_size:
    To: DiskSize
  environment_variables:
    To: EnvironmentVariables
  function_name:
    To: FunctionName
  gpu_memory_size:
    To: GpuMemorySize
  handler:
    To: Handler
  initialization_timeout:
    To: InitializationTimeout
  initializer:
    To: Initializer
  instance_concurrency:
    To: InstanceConcurrency
  instance_lifecycle_config:
    To: InstanceLifecycleConfig
    Type: Map
    Schema:
      pre_freeze:
        To: PreFreeze
        Type: Map
      pre_stop:
        To: PreStop
        Type: Map
  instance_type:
    To: InstanceType
  layers:
    Ignore: true
  memory_size:
    To: MemorySize
  name:
    Ignore: true
  runtime:
    To: Runtime
  service_name:
    To: ServiceName
  timeout:
    To: Timeout
  value:
    Ignore: true
Attributes:
  id:
    To:
    - ServiceName
    - FunctionName
    Handler: colon_join
  ca_port:
    Ignore: true
  code:
    Ignore: true
  code_checksum:
    Ignore: true
  cpu:
    Ignore: true
  create_time:
    Ignore: true
  custom_container_config:
    Ignore: true
  custom_dns:
    Ignore: true
  custom_health_check_config:
    Ignore: true
  custom_runtime_config:
    Ignore: true
  description:
    Ignore: true
  disk_size:
    Ignore: true
  environment_variables:
    Ignore: true
  function_arn:
    To: ARN
  function_name:
    To: FunctionName
  gpu_memory_size:
    Ignore: true
  handler:
    Ignore: true
  initialization_timeout:
    Ignore: true
  initializer:
    Ignore: true
  instance_concurrency:
    Ignore: true
  instance_lifecycle_config:
    Ignore: true
  instance_type:
    Ignore: true
  layers:
    Ignore: true
  memory_size:
    Ignore: true
  runtime:
    Ignore: true
  service_name:
    To: ServiceName
  timeout:
    Ignore: true
