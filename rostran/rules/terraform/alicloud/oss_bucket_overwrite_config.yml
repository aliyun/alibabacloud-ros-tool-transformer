Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_oss_bucket_overwrite_config
  To: ALIYUN::OSS::BucketOverwriteConfig
Properties:
  bucket:
    To: Bucket
  principal:
    Ignore: true
  rule:
    To: Rule
