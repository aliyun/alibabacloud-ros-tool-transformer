Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_maxcompute_project
  To: ALIYUN::MaxCompute::Project
Properties:
  algorithm:
    Ignore: true
  comment:
    To: Comment
  default_quota:
    To: DefaultQuota
  enable:
    Ignore: true
  exception_policy:
    Ignore: true
  ip_white_list:
    To: IpWhiteList
    Type: Map
    Schema:
      ip_list:
        To: IpList
      vpc_ip_list:
        To: VpcIpList
  is_logical:
    Ignore: true
  key:
    Ignore: true
  project_name:
    To: Name
  properties:
    To: Properties
    Type: Map
    Schema:
      allow_full_scan:
        To: AllowFullScan
      enable_decimal2:
        To: EnableDecimal2
      enable_dr:
        Ignore: true
      encryption:
        To: Encryption
        Type: Map
      retention_days:
        To: RetentionDays
      sql_metering_max:
        To: SqlMeteringMax
      table_lifecycle:
        Ignore: true
      timezone:
        Ignore: true
      type_system:
        To: TypeSystem
  protected:
    Ignore: true
  security_properties:
    Ignore: true
  status:
    Ignore: true
  tags:
    Ignore: true
  three_tier_model:
    To: SupportSchemaLevels
  type:
    Ignore: true
  value:
    Ignore: true
Attributes:
  id:
    To: Name
  create_time:
    Ignore: true
  owner:
    Ignore: true
  region_id:
    Ignore: true
  type:
    Ignore: true
