Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_fc_custom_domain
  To: ALIYUN::FC::CustomDomain
Properties:
  cert_config:
    To: CertConfig
    Type: Map
    Schema:
      cert_name:
        To: CertName
      certificate:
        To: Certificate
      private_key:
        To: PrivateKey
  domain_name:
    To: DomainName
  protocol:
    To: Protocol
  route_config:
    To: RouteConfig
    Type: Map
    Schema:
      routes:
        To: Routes
        Type: List
        Schema:
          function_name:
            To: FunctionName
          methods:
            Ignore: true
          path:
            To: Path
          qualifier:
            To: Qualifier
          service_name:
            To: ServiceName
Attributes:
  id:
    To: DomainName
  account_id:
    Ignore: true
  api_version:
    Ignore: true
  created_time:
    Ignore: true
  last_modified_time:
    Ignore: true
