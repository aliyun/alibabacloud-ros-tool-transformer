Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_fc_custom_domain
  To: ALIYUN::FC::CustomDomain
Properties:
  account_id:
    Ignore: true
  api_version:
    To: ApiVersion
  cert_config:
    To: CertConfig
    Type: Map
    Schema:
      cert_name:
        To: CertName
      certificate:
        To: Certificate
      private_key:
        To: PrivateKey
  created_time:
    Ignore: true
  domain_name:
    To: DomainName
  last_modified_time:
    Ignore: true
  protocol:
    To: Protocol
  route_config:
    To: RouteConfig
    Type: Map
    Schema:
      function_name:
        Ignore: true
      methods:
        Ignore: true
      path:
        Ignore: true
      qualifier:
        Ignore: true
      service_name:
        Ignore: true
Attributes:
  id:
    To: DomainName
  account_id:
    Ignore: true
  api_version:
    Ignore: true
  created_time:
    Ignore: true
  domain_name:
    To: DomainName
  last_modified_time:
    Ignore: true
  protocol:
    Ignore: true
