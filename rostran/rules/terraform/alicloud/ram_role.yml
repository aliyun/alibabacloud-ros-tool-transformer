Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_ram_role
  To: ALIYUN::RAM::Role
Properties:
  assume_role_policy_document:
    To: AssumeRolePolicyDocument
  description:
    To: Description
  document:
    To: AssumeRolePolicyDocument
  force:
    To: DeletionForce
  max_session_duration:
    To: MaxSessionDuration
  name:
    To: RoleName
  ram_users:
    Ignore: true
  role_name:
    To: RoleName
  services:
    Ignore: true
  tags:
    To: Tags
    Type: List
  version:
    Ignore: true
Attributes:
  id:
    To: RoleName
  arn:
    To: Arn
  create_time:
    Ignore: true
  role_id:
    To: RoleId
