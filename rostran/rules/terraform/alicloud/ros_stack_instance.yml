Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_ros_stack_instance
  To: ALIYUN::ROS::StackInstances
Properties:
  operation_description:
    To: OperationDescription
  operation_preferences:
    To: OperationPreferences
    Type: Map
  parameter_key:
    Ignore: true
  parameter_overrides:
    To: ParameterOverrides
  parameter_value:
    Ignore: true
  retain_stacks:
    To: RetainStacks
  stack_group_name:
    To: StackGroupName
  stack_instance_account_id:
    To: AccountIds
    Type: List
  stack_instance_region_id:
    To: RegionIds
    Type: List
  timeout_in_minutes:
    To: TimeoutInMinutes
Attributes:
  id:
    Ignore: true
  status:
    Ignore: true
