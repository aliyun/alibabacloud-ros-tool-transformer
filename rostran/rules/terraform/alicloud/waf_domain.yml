Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_waf_domain
  To: ALIYUN::WAF::Domain
Properties:
  cluster_type:
    To: ClusterType
  connection_time:
    To: ConnectionTime
  domain:
    Ignore: true
  domain_name:
    To: DomainName
  http2_port:
    To: Http2Port
    Type: List
  http_port:
    To: HttpPort
    Type: List
  http_to_user_ip:
    To: HttpToUserIp
  https_port:
    To: HttpsPort
    Type: List
  https_redirect:
    To: HttpsRedirect
  instance_id:
    To: InstanceId
  is_access_product:
    To: IsAccessProduct
  load_balancing:
    To: LoadBalancing
  log_headers:
    To: LogHeaders
    Type: List
  read_time:
    To: ReadTime
  resource_group_id:
    To: ResourceGroupId
  source_ips:
    To: SourceIps
    Type: List
  write_time:
    To: WriteTime
Attributes:
  id:
    Ignore: true
  cname:
    To: Cname
