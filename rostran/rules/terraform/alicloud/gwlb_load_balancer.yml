Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_gwlb_load_balancer
  To: ALIYUN::GWLB::LoadBalancer
Properties:
  address_ip_version:
    To: AddressIpVersion
  dry_run:
    Ignore: true
  load_balancer_name:
    To: LoadBalancerName
  resource_group_id:
    To: ResourceGroupId
  tags:
    To: Tags
    Type: List
  vpc_id:
    To: VpcId
  zone_mappings:
    To: ZoneMappings
    Type: List
    Schema:
      vswitch_id:
        To: VSwitchId
      zone_id:
        To: ZoneId
Attributes:
  id:
    To: LoadBalancerId
  create_time:
    To: CreateTime
  status:
    To: BusinessStatus
  zone_mappings:
    To: ZoneMappings
