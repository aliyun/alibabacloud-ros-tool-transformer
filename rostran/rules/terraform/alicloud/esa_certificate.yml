Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_esa_certificate
  To: ALIYUN::ESA::Certificate
Properties:
  cas_id:
    To: CasId
  cert_id:
    To: CertId
  cert_name:
    To: CertName
  certificate:
    To: Certificate
  created_type:
    To: CreatedType
  domains:
    To: Domains
    Type: List
  private_key:
    To: PrivateKey
  region:
    Ignore: true
  site_id:
    To: SiteId
  type:
    Ignore: true
Attributes:
  id:
    To: CertId
  create_time:
    To: CreateTime
  status:
    Ignore: true
