Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_edas_k8s_slb_attachment
  To: ALIYUN::EDAS::K8sSlbBinding
Properties:
  app_id:
    To: AppId
  cert_id:
    Ignore: true
  loadbalancer_protocol:
    Ignore: true
  service_port:
    To: ServicePortInfos
    Type: List
    Schema:
      port:
        To: Port
      protocol:
        Ignore: true
      target_port:
        To: TargetPort
  slb_configs:
    Ignore: true
Attributes:
  id:
    To: AppId
  app_id:
    To: AppId
