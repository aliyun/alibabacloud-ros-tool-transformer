Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_rocketmq_consumer_group
  To: ALIYUN::ROCKETMQ5::ConsumerGroup
Properties:
  consume_retry_policy:
    To: ConsumeRetryPolicy
    Type: Map
    Schema:
      dead_letter_target_topic:
        To: DeadLetterTargetTopic
      max_retry_times:
        To: MaxRetryTimes
      retry_policy:
        To: RetryPolicy
  consumer_group_id:
    To: ConsumerGroupId
  delivery_order_type:
    To: DeliveryOrderType
  instance_id:
    To: InstanceId
  max_receive_tps:
    Ignore: true
  remark:
    To: Remark
Attributes:
  id:
    Ignore: true
  create_time:
    Ignore: true
  region_id:
    Ignore: true
  status:
    Ignore: true
