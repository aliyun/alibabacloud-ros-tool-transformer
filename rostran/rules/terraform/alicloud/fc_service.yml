Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_fc_service
  To: ALIYUN::FC::Service
Properties:
  description:
    To: Description
  internet_access:
    To: InternetAccess
  last_modified:
    Ignore: true
  log_config:
    To: LogConfig
    Type: Map
    Schema:
      logstore:
        To: Logstore
      project:
        To: Project
  mount_dir:
    Ignore: true
  name:
    To: ServiceName
  name_prefix:
    To: ServiceName
  nas_config:
    To: NasConfig
    Type: Map
    Schema:
      group_id:
        To: GroupId
      mount_points:
        To: MountPoints
        Type: List
      user_id:
        To: UserId
  publish:
    Ignore: true
  role:
    To: Role
  server_addr:
    Ignore: true
  service_id:
    Ignore: true
  tags:
    To: Tags
    Handler: tags_dict_to_list
  tracing_config:
    To: TracingConfig
    Type: Map
    Schema:
      params:
        To: Params
      type:
        To: Type
  version:
    Ignore: true
  vpc_config:
    To: VpcConfig
    Type: Map
    Schema:
      security_group_id:
        To: SecurityGroupId
      vpc_id:
        To: VpcId
      vswitch_ids:
        Ignore: true
Attributes:
  id:
    To: ServiceId
  description:
    Ignore: true
  internet_access:
    To: InternetAccess
  last_modified:
    Ignore: true
  name:
    Ignore: true
  role:
    To: Role
  service_id:
    To: ServiceId
  tags:
    To: Tags
  version:
    Ignore: true
