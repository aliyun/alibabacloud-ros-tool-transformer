Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_log_oss_export
  To: ALIYUN::SLS::OssExport
Properties:
  bucket:
    To: Configuration.Sink.Bucket
  buffer_interval:
    To: Configuration.Sink.BufferInterval
  buffer_size:
    To: Configuration.Sink.BufferSize
  compress_type:
    To: Configuration.Sink.CompressionType
  config_columns:
    To: Configuration.Sink.ContentDetail.Columns
  content_type:
    To: Configuration.Sink.ContentType
  csv_config_columns:
    To: Configuration.Sink.ContentDetail.Columns
  csv_config_delimiter:
    To: Configuration.Sink.ContentDetail.Delimiter
  csv_config_escape:
    To: Configuration.Sink.ContentDetail.Escape
  csv_config_header:
    To: Configuration.Sink.ContentDetail.Header
  csv_config_linefeed:
    To: Configuration.Sink.ContentDetail.LineFeed
  csv_config_null:
    To: Configuration.Sink.ContentDetail.Null
  csv_config_quote:
    To: Configuration.Sink.ContentDetail.Quote
  display_name:
    To: DisplayName
  export_name:
    To: ExportName
  from_time:
    To: Configuration.FromTime
  json_enable_tag:
    To: Configuration.Sink.ContentDetail.EnableTag
  log_read_role_arn:
    To: Configuration.Sink.RoleArn
  logstore_name:
    To: Configuration.Logstore
  path_format:
    To: Configuration.Sink.PathFormat
  prefix:
    To: Configuration.Sink.Prefix
  project_name:
    To: ProjectName
  role_arn:
    To: Configuration.RoleArn
  suffix:
    To: Configuration.Sink.Suffix
  time_zone:
    To: Configuration.Sink.TimeZone
Attributes:
  id:
    To: ExportName
